            <span class="company-name" style="color:var(--textMuted)">${esc(c.name)}</span>
            <span class="badge badge-red">Inactive</span>
          </div>`).join('')}
          ${list.length === 0 ? '<div style="padding:40px;text-align:center;color:var(--textMuted)">No companies yet. Add one to get started!</div>' : ''}
        </div>
      </div>`;
    }

    function bindCompanyList() {
      $('#addCompanyBtn').onclick = () => { $('#addCompanyForm').classList.toggle('hidden'); $('#newCompanyName').focus(); };
      $('#cancelAddCompany').onclick = () => $('#addCompanyForm').classList.add('hidden');
      $('#confirmAddCompany').onclick = async () => {
        const name = $('#newCompanyName').value.trim();
        if (!name) return;
        bgWrite(db.collection(userPath()+'/companies').add({ name, active: true }));
        // Optimistic: add temp company
        const tempId = 'temp_'+Date.now();
        state.companies[tempId] = { _id: tempId, name, active: true, assignedGames: [], usernames: [] };
        render();
      };
      $('#newCompanyName').onkeydown = (e) => { if (e.key === 'Enter') $('#confirmAddCompany').click(); };
      $('#companySearch').oninput = () => {
        const q = $('#companySearch').value.toLowerCase();
        $$('.company-item').forEach(el => {
          const name = el.querySelector('.company-name').textContent.toLowerCase();
          el.style.display = name.includes(q) ? '' : 'none';
        });
      };
      $$('.company-item').forEach(el => {
        el.onclick = () => {
          state.selectedCompanyId = el.dataset.id;
          state.view = 'company';
          state.companyTab = 'billing';
          state.billItems = [];
          state.paymentStatus = 'received';
          state.partialAmount = '';
          render();
        };
      });
    }

    // ============================================================
    // RENDER: COMPANY SCREEN
    // ============================================================
    function renderCompanyScreen() {
      const c = state.companies[state.selectedCompanyId];
      if (!c) { state.view = 'companies'; render(); return ''; }
      const isActive = c.active !== false;
      return `<div class="page fade-in">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
          <button class="btn btn-ghost btn-sm" id="backBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg></button>
          <h2 style="font-family:'Orbitron',monospace;font-size:18px;color:var(--purpleLight);flex:1">${esc(c.name)}</h2>
          <span class="badge ${isActive ? 'badge-green' : 'badge-red'}">${isActive ? 'Active' : 'Inactive'}</span>
        </div>
        <div class="tabs">
          <button class="tab tab-green ${state.companyTab==='billing'?'active':''}" data-tab="billing"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 8v8"/><path d="M8 12h8"/></svg> Billing</button>
          <button class="tab tab-cyan ${state.companyTab==='games'?'active':''}" data-tab="games"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="16" cy="11" r="0.5" fill="currentColor"/><circle cx="18" cy="13" r="0.5" fill="currentColor"/></svg> Games Config</button>
          <button class="tab tab-purple ${state.companyTab==='settings'?'active':''}" data-tab="settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Settings</button>
        </div>
        <div id="tabContent">
          ${state.companyTab === 'billing' ? renderBilling(c) : ''}
          ${state.companyTab === 'games' ? renderGamesRates(c) : ''}
          ${state.companyTab === 'settings' ? renderCompanySettings(c) : ''}
        </div>
      </div>`;
    }

    function bindCompanyScreen() {
      $('#backBtn').onclick = () => { state.view = 'companies'; state.selectedCompanyId = null; render(); };
      $$('.tab').forEach(t => {
        t.onclick = () => { state.companyTab = t.dataset.tab; render(); };
      });
      if (state.companyTab === 'billing') bindBilling();
      if (state.companyTab === 'games') bindGamesRates();
      if (state.companyTab === 'settings') bindCompanySettings();
    }

    // ============================================================
    // BILLING
    // ============================================================
    function renderBilling(c) {
      const mode = state.convMode;
      const items = state.billItems;
      const assignedGames = c.assignedGames || [];
      const usernames = c.usernames || [];
      const companyBills = state.bills.filter(b => b.companyId === c._id).sort((a,b) => new Date(b.date)-new Date(a.date));
      const _histToday = new Date().toISOString().slice(0,10);
      const _histFirstOfMonth = _histToday.slice(0,8) + '01';

      let totalPts = 0, totalDollars = 0;
      items.forEach(item => {
        const calc = calcLine(item);
        totalPts += calc.points;
        totalDollars += calc.dollars;
      });

      return `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
          <span class="label" style="margin:0;font-size:12px">Default Mode</span>
          <div id="convToggle" style="display:inline-flex;align-items:center;gap:0;cursor:pointer;user-select:none">
            <div style="padding:6px 12px;border-radius:6px 0 0 6px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;line-height:1;
              background:${mode==='pts2dollar'?'var(--cyan)':'var(--bgInput)'};color:${mode==='pts2dollar'?'#000':'var(--textMuted)'};
              border:1px solid ${mode==='pts2dollar'?'var(--cyan)':'var(--border)'};transition:all 0.2s">PTS<span style="font-size:13px;vertical-align:middle;margin:0 1px">→</span>$</div>
            <div style="padding:6px 12px;border-radius:0 6px 6px 0;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;line-height:1;
              background:${mode==='dollar2pts'?'var(--green)':'var(--bgInput)'};color:${mode==='dollar2pts'?'#000':'var(--textMuted)'};
              border:1px solid ${mode==='dollar2pts'?'var(--green)':'var(--border)'};border-left:0;transition:all 0.2s">$<span style="font-size:13px;vertical-align:middle;margin:0 1px">→</span>PTS</div>
          </div>
        </div>

        <div id="billItemsContainer" style="position:relative;z-index:10">
          ${items.map((item, idx) => renderBillItem(item, idx, assignedGames, usernames)).join('')}
        </div>

        <button class="btn btn-full" id="addBillItem" style="margin-bottom:20px;background:linear-gradient(135deg,var(--purple),rgba(6,182,212,0.6));color:#fff;font-weight:700;padding:14px;font-size:14px;letter-spacing:1px;border:none;box-shadow:0 4px 20px rgba(124,58,237,0.3)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
          ADD GAME TO BILL
        </button>

        <div class="card totals-card" style="margin-bottom:14px">
          <div style="font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--purpleLight);margin-bottom:12px;letter-spacing:1px">LIVE BILL</div>
          <div style="display:flex;gap:24px;margin-bottom:14px">
            <div style="flex:1">
              <div style="font-size:11px;color:var(--textMuted);text-transform:uppercase">Points</div>
              <div id="liveTotalPts" style="font-size:20px;font-weight:700;color:#22d3ee;font-family:'Orbitron',monospace">${fmtPts(totalPts)}</div>
            </div>
            <div style="flex:1">
              <div style="font-size:11px;color:var(--textMuted);text-transform:uppercase">Amount</div>
              <div id="liveTotalDol" style="font-size:20px;font-weight:700;color:#34d399;font-family:'Orbitron',monospace">$${fmtDol(totalDollars)}</div>
            </div>
          </div>
          <div style="border-top:1px solid var(--border);padding-top:12px">
            <span class="label" style="margin-bottom:8px">Payment Status</span>
            <div class="payment-btns">
              <button class="btn ${state.paymentStatus==='received'?'btn-green':'btn-outline-green'} btn-sm" data-pay="received">Received Full</button>
              <button class="btn ${state.paymentStatus==='partial'?'btn-orange':'btn-outline-orange'} btn-sm" data-pay="partial">Partial</button>
              <button class="btn ${state.paymentStatus==='not_received'?'btn-red':'btn-outline-red'} btn-sm" data-pay="not_received">Not Received</button>
            </div>
            ${state.paymentStatus === 'partial' ? `
              <div style="margin-top:8px;max-width:200px">
                <input class="input" type="number" id="partialAmountInput" placeholder="Amount received" value="${esc(state.partialAmount)}" />
              </div>
            ` : ''}
            <div style="margin-top:8px;color:var(--orange);font-weight:600">
              Balance Due: <span id="liveBalanceDue">$${fmtDol(totalDollars - (state.paymentStatus === 'received' ? totalDollars : state.paymentStatus === 'partial' ? (parseFloat(state.partialAmount)||0) : 0))}</span>
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:14px">
            <button class="btn btn-cyan" id="copyBill"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy</button>
            <button class="btn btn-green" id="saveBill"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg> Save</button>
            <button class="btn btn-red" id="clearBill" style="margin-left:auto"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg> Clear</button>
          </div>
        </div>
        <div id="billSavedMsg" class="hidden" style="margin-top:10px">
          <div class="card" style="background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.2)">
            <span style="color:var(--green);font-weight:600">✓ Bill saved successfully!</span>
          </div>
        </div>

        <div class="card" style="margin-top:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <h4 style="font-family:'Orbitron',monospace;font-size:13px;color:var(--purpleLight)">BILL HISTORY</h4>
            <button class="btn btn-ghost btn-sm" id="clearBillHistory" style="color:var(--red);font-size:11px">Clear</button>
          </div>
          <div style="margin-bottom:10px">
            <input class="input" id="billHistSearch" placeholder="Search game or username..." style="font-size:13px" />
          </div>
          <div style="display:flex;gap:6px;margin-bottom:10px;align-items:flex-end;flex-wrap:wrap">
            <div style="flex:1;min-width:100px">
              <span class="label" style="font-size:10px">From</span>
              <input class="input" type="datetime-local" id="billHistFrom" value="${_histFirstOfMonth}T00:00" style="font-size:12px;padding:6px 8px" placeholder="From" />
            </div>
            <div style="flex:1;min-width:100px">
              <span class="label" style="font-size:10px">To</span>
              <input class="input" type="datetime-local" id="billHistTo" value="${_histToday}T23:59" style="font-size:12px;padding:6px 8px" placeholder="To" />
            </div>
            <button class="btn btn-ghost btn-sm" id="billHistFilter" style="font-size:11px">Filter</button>
            <button class="btn btn-ghost btn-sm" id="billHistReset" style="font-size:11px;color:var(--textMuted)">Reset</button>
          </div>
          <div id="billHistList" style="max-height:300px;overflow-y:auto">
            ${companyBills.length===0?'<div style="padding:16px;text-align:center;color:var(--textMuted);font-size:13px">No bills yet</div>':''}
            ${companyBills.map(b => {
              const plItems = (b.items||[]).map(i => {
                const sellR = getGameRate(c, i.gameName)||0;
                const costR = getCostRate(i.gameName);
                const sp = (i.points||0)*(sellR/100);
                const cp = (i.points||0)*(costR/100);
                return { ...i, sp, cp, pl: sp-cp };
              });
              const totalPL = plItems.reduce((s,i)=>s+i.pl,0);
              return `<div class="bill-hist-wrap" data-date="${b.date}" data-billid="${b._id}" data-search="${(b.items||[]).map(i=>(i.gameName||'')+(i.username||'')).join(' ').toLowerCase()}">
              <div class="bill-history-item" style="cursor:pointer" onclick="this.nextElementSibling.classList.toggle('hidden')">
                <div style="flex:1">
                  <div style="font-size:12px;color:var(--textSecondary)">${new Date(b.date).toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'})} ${new Date(b.date).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}</div>
                  <div style="font-size:11px;color:var(--textMuted)">${(b.items||[]).length} items · <span style="color:${totalPL>=0?'#34d399':'var(--red)'}">P/L $${totalPL.toFixed(2)}</span></div>
                </div>
                <div style="text-align:right">
                  <div style="font-weight:700;color:#34d399;font-family:'Orbitron',monospace;font-size:13px">$${(b.totalDollars||0).toFixed(2)}</div>
                  <div style="font-size:11px;color:#22d3ee">${(b.totalPoints||0).toFixed(2)} pts</div>
                </div>
                <span class="badge ${b.paymentStatus==='received'?'badge-green':b.paymentStatus==='partial'?'badge-orange':'badge-red'}" style="margin:0 4px">
                  ${b.paymentStatus==='received'?'Paid':b.paymentStatus==='partial'?'Partial':'Due'}
                </span>
                <button class="btn btn-ghost btn-sm bill-hist-del" data-billid="${b._id}" style="color:var(--red);padding:3px 5px" onclick="event.stopPropagation()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg></button>
              </div>
              <div class="hidden" style="padding:8px 12px;background:rgba(10,8,20,0.5);border-bottom:1px solid rgba(60,50,100,0.3);font-size:12px">
                ${plItems.map(i => `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(60,50,100,0.15)">
                  <span style="color:var(--textSecondary)">${i.gameName||'-'}</span>
                  <span style="color:var(--textMuted)">${i.username||'-'}</span>
                  <span style="color:#22d3ee">${(i.points||0)} pts</span>
                  <span style="color:#34d399">$${(i.dollars||0).toFixed(2)}</span>
                  <span style="color:${i.pl>=0?'#34d399':'var(--red)'}">P/L $${i.pl.toFixed(2)}</span>
                </div>`).join('')}
              </div>
            </div>`;}).join('')}
          </div>
        </div>
      `;
    }

    function renderBillItem(item, idx, assignedGames, usernames) {
      const calc = calcLine(item);
      const gameOptions = assignedGames.map(g => `<option value="${g._id}" ${item.gameId===g._id?'selected':''}>${esc(g.gameName)}</option>`).join('');
      const gameUsernames = item.gameId ? usernames.filter(u => {
        const ag = assignedGames.find(g => g._id === item.gameId);
        return ag && u.gameName === ag.gameName;
      }) : [];
      // Sort: recent first
      const sorted = [...gameUsernames].sort((a, b) => {
        const ai = state.recentUsernames.indexOf(a.username);
        const bi = state.recentUsernames.indexOf(b.username);
        if (ai >= 0 && bi >= 0) return ai - bi;
        if (ai >= 0) return -1;
        if (bi >= 0) return 1;
        return 0;
      });
      const unOptions = sorted.map(u =>
        `<option value="${esc(u.username)}" ${item.username===u.username?'selected':''}>${esc(u.username)}${u.level?' ['+esc(u.level)+']':''}${state.recentUsernames.includes(u.username)?' ★':''}</option>`
      ).join('');

      return `<div class="bill-item card" style="margin-bottom:8px;padding:14px;position:relative;overflow:visible" data-idx="${idx}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <span style="font-family:'Orbitron',monospace;font-size:11px;color:var(--textMuted)">#${idx+1}</span>
          <div style="flex:1"></div>
          <button class="btn btn-ghost btn-sm bill-remove" data-idx="${idx}" style="color:var(--red)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
        </div>
        <div class="bill-grid">
          <div>
            <span class="label">Game</span>
            <div style="position:relative" class="bill-game-wrap" data-idx="${idx}">
              <input class="input bill-game-search" data-idx="${idx}" placeholder="Search game..." value="${esc(item.gameName)}" autocomplete="off" />
              <div class="bill-game-dropdown hidden" data-idx="${idx}" style="position:absolute;top:calc(100% + 2px);left:0;right:0;background:rgba(16,13,30,0.97);border:1px solid var(--glassBorder);border-radius:10px;z-index:200;max-height:200px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.6)">
                ${assignedGames.map(g => `<div class="dropdown-item bill-game-option" data-gameid="${g._id}" data-gamename="${esc(g.gameName)}" data-rate="${g.rate||0}" data-idx="${idx}">${esc(g.gameName)} <span style="font-size:11px;color:var(--textMuted)">${g.rate||0}%</span></div>`).join('')}
              </div>
            </div>
          </div>
          <div>
            <span class="label">Username</span>
            <div style="display:flex;gap:4px">
              <div style="position:relative;flex:1" class="bill-user-wrap" data-idx="${idx}">
                <input class="input bill-user-search" data-idx="${idx}" placeholder="Search user..." value="${esc(item.username)}" autocomplete="off" style="padding-right:8px" />
                <div class="bill-user-dropdown hidden" data-idx="${idx}" style="position:absolute;top:calc(100% + 2px);left:0;right:0;background:rgba(16,13,30,0.97);border:1px solid var(--glassBorder);border-radius:10px;z-index:200;max-height:200px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.6)">
                  <div class="dropdown-item" data-user="" style="color:var(--textMuted);font-style:italic">No Username</div>
                  ${sorted.map(u => `<div class="dropdown-item bill-user-option" data-user="${esc(u.username)}" data-idx="${idx}">${esc(u.username)}${u.level?' <span style=\\"font-size:11px;color:var(--textMuted)\\">['+esc(u.level)+']</span>':''}${state.recentUsernames.includes(u.username)?' <span style=\\"color:var(--orange)\\">★</span>':''}</div>`).join('')}
                </div>
              </div>
              <button class="btn btn-ghost btn-sm bill-quick-add-user" data-idx="${idx}" data-gameid="${item.gameId}" title="Quick add username" style="padding:6px;border:1px solid var(--border);border-radius:8px;font-size:16px;line-height:1">+</button>
            </div>
          </div>
          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
              <span class="label" style="margin:0">${(item.mode||state.convMode)==='pts2dollar'?'Points':'Amount ($)'}</span>
              <div class="bill-mode-switch" data-idx="${idx}" style="display:inline-flex;cursor:pointer;font-size:10px;font-family:'Orbitron',monospace;font-weight:700;border-radius:4px;overflow:hidden;border:1px solid var(--glassBorder)">
                <span style="padding:2px 6px;background:${(item.mode||state.convMode)==='pts2dollar'?'var(--cyan)':'transparent'};color:${(item.mode||state.convMode)==='pts2dollar'?'#000':'var(--textMuted)'};transition:all 0.2s">P</span>
                <span style="padding:2px 6px;background:${(item.mode||state.convMode)==='dollar2pts'?'var(--green)':'transparent'};color:${(item.mode||state.convMode)==='dollar2pts'?'#000':'var(--textMuted)'};transition:all 0.2s">$</span>
              </div>
            </div>
            <input class="input bill-value-input" data-idx="${idx}" type="number" placeholder="${(item.mode||state.convMode)==='pts2dollar'?'Enter points':'Enter $'}" value="${item.value}" />
          </div>
        </div>
        ${item.value ? `<div class="bill-result">
          <span class="pts"><strong>Pts:</strong> ${fmtPts(calc.points)}</span>
          <span class="amt"><strong>$:</strong> ${fmtDol(calc.dollars)}</span>
          <span class="rate">Rate: ${item.rate}%</span>
        </div>` : ''}
      </div>`;
    }

    function calcLine(item) {
      const val = parseFloat(item.value) || 0;
      const rate = item.rate || 0;
      const rateDecimal = rate / 100;
      const mode = item.mode || state.convMode;
      if (mode === 'pts2dollar') {
        return { points: val, dollars: rateDecimal ? val * rateDecimal : 0 };
      } else {
        return { dollars: val, points: rateDecimal ? Math.trunc(val / rateDecimal) : 0 };
      }
    }

    function fmtPts(v) { return Number.isInteger(v) ? v.toString() : v.toFixed(2); }
    function fmtDol(v) { return v.toFixed(2); }

    function bindBilling() {
      const c = state.companies[state.selectedCompanyId];
      if (!c) return;

      $('#convToggle').onclick = () => {
        state.convMode = state.convMode === 'pts2dollar' ? 'dollar2pts' : 'pts2dollar';
        render();
      };

      $('#addBillItem').onclick = () => {
        state.billItems.push({ id: genId(), gameId: '', gameName: '', username: '', value: '', rate: 0, mode: state.convMode });
        render();
      };

      $$('.bill-remove').forEach(btn => {
        btn.onclick = () => { state.billItems.splice(parseInt(btn.dataset.idx), 1); render(); };
      });

      // Per-item mode switch
      $$('.bill-mode-switch').forEach(sw => {
        sw.onclick = () => {
          const idx = parseInt(sw.dataset.idx);
          const cur = state.billItems[idx].mode || state.convMode;
          state.billItems[idx].mode = cur === 'pts2dollar' ? 'dollar2pts' : 'pts2dollar';
          state.billItems[idx].value = ''; // Reset value on mode switch
          render();
        };
      });

      // Searchable game dropdowns in billing
      $$('.bill-game-search').forEach(inp => {
        const idx = parseInt(inp.dataset.idx);
        const dropdown = $(`.bill-game-dropdown[data-idx="${idx}"]`);
        if (!dropdown) return;
        inp.onfocus = () => { dropdown.classList.remove('hidden'); };
        inp.oninput = () => {
          dropdown.classList.remove('hidden');
          const q = inp.value.toLowerCase();
          dropdown.querySelectorAll('.dropdown-item').forEach(opt => {
            opt.style.display = opt.dataset.gamename.toLowerCase().includes(q) ? '' : 'none';
          });
        };
        dropdown.querySelectorAll('.dropdown-item').forEach(opt => {
          opt.onclick = () => {
            state.billItems[idx].gameId = opt.dataset.gameid;
            state.billItems[idx].gameName = opt.dataset.gamename;
            state.billItems[idx].rate = parseFloat(opt.dataset.rate) || 0;
            state.billItems[idx].username = '';
            dropdown.classList.add('hidden');
            render();
          };
        });
      });
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.bill-game-wrap')) {
          $$('.bill-game-dropdown').forEach(d => d.classList.add('hidden'));
        }
      });

      // Searchable username dropdowns in billing
      $$('.bill-user-search').forEach(inp => {
        const idx = parseInt(inp.dataset.idx);
        const dropdown = $(`.bill-user-dropdown[data-idx="${idx}"]`);
        if (!dropdown) return;

        inp.onfocus = () => { dropdown.classList.remove('hidden'); };
        inp.oninput = () => {
          dropdown.classList.remove('hidden');
          const q = inp.value.toLowerCase();
          dropdown.querySelectorAll('.dropdown-item').forEach(opt => {
            const user = opt.dataset.user || '';
            const text = opt.textContent.toLowerCase();
            // Always show "No Username" option
            opt.style.display = (user === '' || text.includes(q)) ? '' : 'none';
          });
        };

        dropdown.querySelectorAll('.dropdown-item').forEach(opt => {
          opt.onclick = () => {
            const un = opt.dataset.user;
            state.billItems[idx].username = un;
            inp.value = un;
            dropdown.classList.add('hidden');
            if (un) {
              state.recentUsernames = [un, ...state.recentUsernames.filter(u => u !== un)].slice(0, 10);
            }
          };
        });
      });

      // Close all username dropdowns when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.bill-user-wrap')) {
          $$('.bill-user-dropdown').forEach(d => d.classList.add('hidden'));
        }
      });

      // Quick add username from billing
      $$('.bill-quick-add-user').forEach(btn => {
        btn.onclick = async () => {
          const idx = parseInt(btn.dataset.idx);
          const item = state.billItems[idx];
          const ag = (c.assignedGames||[]).find(g => g._id === item.gameId);
          const gameName = ag ? ag.gameName : '';
          if (!gameName) { alert('Select a game first'); return; }
          // Styled username + level modal
          const levels = ['Agent','Master','Distributor','Sub-Distributor','Store','Player'];
          const result = await new Promise(resolve => {
            const ov = document.createElement('div');
            ov.className = 'modal-overlay';
            ov.innerHTML = `<div class="modal fade-in" style="max-width:320px;padding:22px;overflow:visible">
              <div style="font-family:'Orbitron',monospace;font-size:13px;color:var(--purpleLight);margin-bottom:16px;text-align:center">ADD USERNAME</div>
              <div style="margin-bottom:12px">
                <span class="label">Username</span>
                <input class="input" id="_qaName" placeholder="Enter username" autofocus />
              </div>
              <div style="margin-bottom:16px;position:relative" id="_qaLevelWrap">
                <span class="label">Level</span>
                <div class="input" id="_qaLevelTrigger" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between">
                  <span id="_qaLevelText" style="color:var(--textMuted)">Select level</span>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--textMuted)" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
                </div>
                <input type="hidden" id="_qaLevel" value="" />
                <div id="_qaLevelDrop" class="hidden" style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:rgba(16,13,30,0.97);border:1px solid var(--glassBorder);border-radius:10px;z-index:999;max-height:220px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.6)">
                  <div class="dropdown-item _qa-lv-opt" data-val="" style="color:var(--textMuted);font-style:italic">None</div>
                  ${levels.map(l => '<div class="dropdown-item _qa-lv-opt" data-val="'+l+'">'+l+'</div>').join('')}
                </div>
              </div>
              <div style="display:flex;gap:8px">
                <button class="btn btn-green" id="_qaConfirm" style="flex:1;justify-content:center">Add</button>
                <button class="btn btn-ghost" id="_qaCancel" style="flex:1;justify-content:center">Cancel</button>
              </div>
            </div>`;
            document.body.appendChild(ov);
            // Bind custom level dropdown in modal
            ov.querySelector('#_qaLevelTrigger').onclick = (e) => {
              e.stopPropagation();
              ov.querySelector('#_qaLevelDrop').classList.toggle('hidden');
            };
            ov.querySelectorAll('._qa-lv-opt').forEach(opt => {
              opt.onclick = () => {
                const v = opt.dataset.val;
                ov.querySelector('#_qaLevel').value = v;
                ov.querySelector('#_qaLevelText').textContent = v || 'Select level';
                ov.querySelector('#_qaLevelText').style.color = v ? 'var(--textPrimary)' : 'var(--textMuted)';
                ov.querySelector('#_qaLevelDrop').classList.add('hidden');
              };
            });
            ov.querySelector('#_qaConfirm').onclick = () => {
              const name = ov.querySelector('#_qaName').value.trim();
              const level = ov.querySelector('#_qaLevel').value;
              if (!name) { ov.querySelector('#_qaName').focus(); return; }
              ov.remove();
              resolve({ name, level });
            };
            ov.querySelector('#_qaCancel').onclick = () => { ov.remove(); resolve(null); };
            ov.querySelector('#_qaName').onkeydown = (e) => { if (e.key==='Enter') ov.querySelector('#_qaConfirm').click(); };
            ov.onclick = (e) => { if(e.target===ov){ov.remove();resolve(null);} };
            setTimeout(() => ov.querySelector('#_qaName')?.focus(), 100);
          });
          if (!result) return;
          await trackedWrite(() => db.collection(`${userPath()}/companies/${c._id}/usernames`).add({ gameName, username: result.name, level: result.level||'' }));
          state.billItems[idx].username = result.name;
          render();
        };
      });

      $$('.bill-value-input').forEach(inp => {
        inp.oninput = () => {
          const idx = parseInt(inp.dataset.idx);
          state.billItems[idx].value = inp.value;
          const item = state.billItems[idx];
          const calc = calcLine(item);
          const card = inp.closest('.bill-item');
          let result = card.querySelector('.bill-result');
          if (inp.value) {
            const html = `<span class="pts"><strong>Pts:</strong> ${fmtPts(calc.points)}</span>
              <span class="amt"><strong>$:</strong> ${fmtDol(calc.dollars)}</span>
              <span class="rate">Rate: ${item.rate}%</span>`;
            if (!result) {
              result = document.createElement('div');
              result.className = 'bill-result';
              card.querySelector('.bill-grid').insertAdjacentElement('afterend', result);
            }
            result.innerHTML = html;
          } else if (result) {
            result.remove();
          }
          // Live update totals in DOM
          let tp=0,td=0; state.billItems.forEach(it=>{const cl=calcLine(it);tp+=cl.points;td+=cl.dollars;});
          const totalPtsEl = document.getElementById('liveTotalPts');
          const totalDolEl = document.getElementById('liveTotalDol');
          const balEl = document.getElementById('liveBalanceDue');
          if (totalPtsEl) totalPtsEl.textContent = fmtPts(tp);
          if (totalDolEl) totalDolEl.textContent = '$' + fmtDol(td);
          if (balEl) {
            const recv = state.paymentStatus==='partial'?parseFloat(state.partialAmount)||0:state.paymentStatus==='received'?td:0;
            balEl.textContent = '$' + fmtDol(td - recv);
          }
        };
      });

      $$('[data-pay]').forEach(btn => {
        btn.onclick = () => { state.paymentStatus = btn.dataset.pay; render(); };
      });

      if ($('#partialAmountInput')) {
        $('#partialAmountInput').oninput = (e) => {
          state.partialAmount = e.target.value;
          // Live update balance due
          let td = 0;
          state.billItems.forEach(it => { td += calcLine(it).dollars; });
          const recv = parseFloat(state.partialAmount) || 0;
          const balEl = document.getElementById('liveBalanceDue');
          if (balEl) balEl.textContent = '$' + fmtDol(td - recv);
        };
      }

      if ($('#copyBill')) {
        $('#copyBill').onclick = () => {
          const text = generateBillText(c);
          navigator.clipboard.writeText(text).then(() => alert('Bill copied to clipboard!'));
        };
      }

      if ($('#saveBill')) {
        $('#saveBill').onclick = async () => {
          const saveBtn = $('#saveBill');
          const origHTML = saveBtn.innerHTML;
          saveBtn.disabled = true;
          saveBtn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;margin:0"></span> Saving...';
          const bill = buildBillObject(c);
          // Deduct from master games
          for (const item of state.billItems) {
            if (item.gameId) {
              const calc = calcLine(item);
              const mg = state.masterGames.find(g => g.name === item.gameName);
              if (mg) {
                const newPts = (mg.remainingPoints || 0) - calc.points;
                bgWrite(db.doc(userPath()+'/masterGames/'+mg._id).update({ remainingPoints: newPts }));
                mg.remainingPoints = newPts; // Optimistic update
              }
            }
          }
          bgWrite(db.collection(userPath()+'/bills').add(bill));
          // Optimistically add to local state
          state.bills.unshift({ ...bill, _id: 'pending_'+Date.now() });
          // Don't wait for full reload - listeners will update state
          saveBtn.disabled = false;
          saveBtn.innerHTML = origHTML;
          $('#billSavedMsg').classList.remove('hidden');
          setTimeout(() => { try { $('#billSavedMsg')?.classList.add('hidden'); } catch(e){} }, 2000);
          render(); // Re-render to show new bill in history
        };
      }

      if ($('#clearBill')) {
        $('#clearBill').onclick = () => {
          if (state.billItems.length === 0) return;
          if (!confirm('Clear all bill items?')) return;
          state.billItems = [];
          state.paymentStatus = 'received';
          state.partialAmount = '';
          render();
        };
      }

      // Bill history bindings (now in billing tab)
      if ($('#billHistSearch')) {
        const filterHist = () => {
          const q = ($('#billHistSearch')?.value||'').toLowerCase();
          const from = $('#billHistFrom')?.value;
          const to = $('#billHistTo')?.value;
          const fromD = from ? new Date(from) : null;
          const toD = to ? new Date(to) : null;
          $$('.bill-hist-wrap').forEach(el => {
            const d = new Date(el.dataset.date);
            const matchDate = (!fromD || d>=fromD) && (!toD || d<=toD);
            const matchSearch = !q || (el.dataset.search||'').includes(q);
            el.style.display = (matchDate && matchSearch) ? '' : 'none';
          });
        };
        $('#billHistSearch').oninput = filterHist;
        if ($('#billHistFilter')) $('#billHistFilter').onclick = filterHist;
        if ($('#billHistReset')) {
          $('#billHistReset').onclick = () => {
            const _td = new Date().toISOString().slice(0,10);
            const _fm = _td.slice(0,8)+'01';
            $('#billHistFrom').value=_fm+'T00:00'; $('#billHistTo').value=_td+'T23:59'; $('#billHistSearch').value='';
            $$('.bill-hist-wrap').forEach(el => el.style.display='');
          };
        }
      }
      if ($('#clearBillHistory')) {
        $('#clearBillHistory').onclick = async () => {
          const compBills = state.bills.filter(b => b.companyId === c._id);
          if (compBills.length===0) return;
          if (!confirm('Delete all '+compBills.length+' bills?')) return;
          for (const bill of compBills) { await db.doc(userPath()+'/bills/'+bill._id).delete(); }
          state.bills = state.bills.filter(b => b.companyId !== c._id);
          render();
        };
      }
      $$('.bill-hist-del').forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          if (!confirm('Delete this bill?')) return;
          const bid = btn.dataset.billid;
          btn.disabled = true; btn.innerHTML = '...';
          try {
            await trackedWrite(() => db.doc(userPath()+'/bills/'+bid).delete());
            state.bills = state.bills.filter(b => b._id !== bid);
            btn.closest('.bill-hist-wrap').remove();
          } catch(e) { alert('Delete failed'); }
        };
      });
    }

    function updateTotals() {
      let totalPts = 0, totalDollars = 0;
      state.billItems.forEach(item => {
        const calc = calcLine(item);
        totalPts += calc.points;
        totalDollars += calc.dollars;
      });
      // Quick DOM update if elements exist
      // Just re-render for simplicity with totals
    }

    function generateBillText(c) {
      let totalPts = 0, totalDollars = 0;
      state.billItems.forEach(i => { const calc = calcLine(i); totalPts += calc.points; totalDollars += calc.dollars; });
      const received = state.paymentStatus==='partial'?parseFloat(state.partialAmount)||0 : state.paymentStatus==='received'?totalDollars:0;
      const now = new Date();
      const dateStr = now.getUTCFullYear() + '/' + String(now.getUTCMonth()+1).padStart(2,'0') + '/' + String(now.getUTCDate()).padStart(2,'0') + ' ' + String(now.getUTCHours()).padStart(2,'0') + ':' + String(now.getUTCMinutes()).padStart(2,'0') + ' UTC';
      const lines = [];
      lines.push(`${c.name} - Bill`);
      lines.push(dateStr);
      lines.push('');
      state.billItems.forEach(item => {
        const calc = calcLine(item);
        lines.push(`${item.gameName||'-'} | ${item.username||'-'} | ${fmtPts(calc.points)} : $${fmtDol(calc.dollars)}`);
      });
      lines.push('');
      lines.push(`Total ($): ${fmtDol(totalDollars)}`);
      if (state.paymentStatus === 'received') {
        lines.push('Paid: Full');
      } else if (state.paymentStatus === 'partial') {
        lines.push(`Paid: $${fmtDol(received)}`);
      } else {
        lines.push('Paid: None');
      }
      lines.push(`Balance Due ($): ${fmtDol(totalDollars - received)}`);
      return lines.join('\n');
    }

    function buildBillObject(c) {
      let totalPts = 0, totalDollars = 0;
      const items = state.billItems.map(item => {
        const calc = calcLine(item);
        totalPts += calc.points; totalDollars += calc.dollars;
        const costRate = getCostRate(item.gameName); return { gameName:item.gameName, gameId:item.gameId, username:item.username, value:parseFloat(item.value)||0, costRate, ...calc };
      });
      const received = state.paymentStatus==='partial'?parseFloat(state.partialAmount)||0:state.paymentStatus==='received'?totalDollars:0;
      return {
        companyId:c._id, companyName:c.name, date:new Date().toISOString(), convMode:state.convMode,
        items, totalDollars, totalPoints:totalPts, paymentStatus:state.paymentStatus,
        partialAmount:received, balanceDue:totalDollars-received
      };
    }

                </div>

                <div id="unLevelDropdown" class="hidden" style="position:absolute;bottom:calc(100% + 4px);left:0;right:0;background:rgba(16,13,30,0.97);border:1px solid var(--glassBorder);border-radius:10px;z-index:999;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,0.6)">
                  <div class="dropdown-item un-level-opt" data-val="" style="color:var(--textMuted);font-style:italic">None</div>
                  <div class="dropdown-item un-level-opt" data-val="Agent">Agent</div>
                  <div class="dropdown-item un-level-opt" data-val="Master">Master</div>
                  <div class="dropdown-item un-level-opt" data-val="Distributor">Distributor</div>
                  <div class="dropdown-item un-level-opt" data-val="Sub-Distributor">Sub-Distributor</div>
                  <div class="dropdown-item un-level-opt" data-val="Store">Store</div>
                  <div class="dropdown-item un-level-opt" data-val="Player">Player</div>
                </div>
              </div>
            </div>
            <button class="btn btn-green" id="unAddBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Add</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <div style="flex:1;position:relative" id="unGameFilterWrap">
            <input class="input" id="unGameFilterInput" placeholder="All Games" value="" autocomplete="off" style="cursor:pointer;padding-right:28px" readonly />
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--textMuted)" stroke-width="2.5" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none"><polyline points="6,15 12,9 18,15"/></svg>
            <input type="hidden" id="unGameFilter" value="" />
            <div id="unGameFilterDrop" class="hidden" style="position:absolute;bottom:calc(100% + 4px);left:0;right:0;background:rgba(16,13,30,0.97);border:1px solid var(--glassBorder);border-radius:10px;z-index:300;max-height:260px;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,0.6)">
              <div class="dropdown-item un-gf-opt" data-val="" style="color:var(--cyan);font-weight:600">All Games</div>
              ${assigned.map(g => '<div class="dropdown-item un-gf-opt" data-val="' + esc(g.gameName) + '">' + esc(g.gameName) + '</div>').join('')}
            </div>
          </div>
          <div class="search-wrap" style="flex:1">
            <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span>
            <input class="input input-search" id="unSearch" placeholder="Search usernames..." />
          </div>
        </div>
        <div id="usernamesList">
          ${allUsernames.map(u => {
            const levelColors = {Master:'badge-red',Distributor:'badge-orange','Sub-Distributor':'badge-cyan',Store:'badge-purple',Agent:'badge-pink',Player:'badge-green'};
            const lvBadge = u.level ? `<span class="badge ${levelColors[u.level]||'badge-orange'}" style="margin-left:4px">${esc(u.level)}</span>` : '';
            return `<div class="username-row" data-id="${u._id}" data-game="${esc(u.gameName)}">
            <span style="font-size:15px;margin-right:10px">👤</span>
            <span style="flex:1;font-weight:600;font-size:13px">${esc(u.username)}</span>
            <span class="badge badge-purple">${esc(u.gameName)}</span>
            ${lvBadge}
            <button class="btn btn-ghost btn-sm un-del" data-id="${u._id}" style="margin-left:6px;color:var(--red)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
          </div>`;}).join('')}
          ${allUsernames.length===0?'<div style="padding:30px;text-align:center;color:var(--textMuted)">No usernames added yet</div>':''}
        </div>
      `;
    }

    function bindGamesRates() {
      const c = state.companies[state.selectedCompanyId];
      if (!c) return;
      const cid = c._id;

      $$('.subtab').forEach(t => {
        t.onclick = () => { state.gamesSubTab = t.dataset.sub; render(); };
      });

      if (state.gamesSubTab === 'rates') {
        let selectedGames = [];
        $('#showAssignGame').onclick = () => { $('#assignGameForm').classList.toggle('hidden'); if($('#assignGameSearch')) $('#assignGameSearch').focus(); };
        // Search available games
        if ($('#assignGameSearch')) {
          $('#assignGameSearch').oninput = () => {
            const q = $('#assignGameSearch').value.toLowerCase();
            $$('.game-tag').forEach(tag => {
              const name = tag.dataset.name.toLowerCase();
              tag.style.display = name.includes(q) ? '' : 'none';
            });
          };
        }
        const sortAssignTags = () => {
          const container = $('#availableGames');
          if (!container) return;
          const tags = [...container.querySelectorAll('.game-tag')];
          tags.sort((a,b) => {
            const aS = a.classList.contains('selected') ? 0 : 1;
            const bS = b.classList.contains('selected') ? 0 : 1;
            return aS - bS || a.dataset.name.localeCompare(b.dataset.name);
          });
          tags.forEach(t => container.appendChild(t));
        };
        $$('.game-tag').forEach(tag => {
          tag.onclick = () => {
            const name = tag.dataset.name;
            if (selectedGames.includes(name)) {
              selectedGames = selectedGames.filter(n => n !== name);
              tag.classList.remove('selected');
              tag.textContent = name;
            } else {
              selectedGames.push(name);
              tag.classList.add('selected');
              tag.textContent = '✓ ' + name;
            }
            if ($('#assignGameCount')) $('#assignGameCount').textContent = '(' + selectedGames.length + ' selected)';
            sortAssignTags();
          };
        });
        if ($('#assignRate')) $('#assignRate').onkeydown = (e) => { if (e.key === 'Enter') $('#confirmAssign').click(); };
        $('#confirmAssign').onclick = async () => {
          const rate = parseFloat($('#assignRate').value) || 0;
          for (const name of selectedGames) {
            await trackedWrite(() => db.collection(`${userPath()}/companies/${cid}/assignedGames`).add({ gameName: name, rate }));
          }
          render();
        };
        $('#rateSearch').oninput = () => {
          const q = $('#rateSearch').value.toLowerCase();
          $$('.assigned-row').forEach(r => {
            const name = r.querySelector('span:nth-child(2)').textContent.toLowerCase();
            r.style.display = name.includes(q) ? '' : 'none';
          });
        };
        $$('.rate-edit').forEach(btn => {
          btn.onclick = () => {
            const id = btn.dataset.id;
            const g = (c.assignedGames||[]).find(x => x._id === id);
            if (!g) return;
            const row = btn.closest('.assigned-row');
            const badge = row.querySelector('.badge');
            badge.outerHTML = `<input class="input" type="number" value="${g.rate||0}" id="editRate_${id}" style="width:80px"/>`;
            btn.outerHTML = `<button class="btn btn-green btn-sm" id="saveRate_${id}">✓</button>`;
            $(`#editRate_${id}`).onkeydown = (e) => { if (e.key === 'Enter') $(`#saveRate_${id}`).click(); };
            $(`#saveRate_${id}`).onclick = async () => {
              const newRate = parseFloat($(`#editRate_${id}`).value) || 0;
              await trackedWrite(() => db.doc(`${userPath()}/companies/${cid}/assignedGames/${id}`).update({ rate: newRate }));
              render();
            };
          };
        });
        $$('.rate-del').forEach(btn => {
          btn.onclick = async () => {
            if (!confirm('Remove this game?')) return;
            await trackedWrite(() => db.doc(`${userPath()}/companies/${cid}/assignedGames/${btn.dataset.id}`).delete());
            render();
          };
        });
      }

      if (state.gamesSubTab === 'usernames') {
        const filterAndSearch = () => {
          const gameFilter = $('#unGameFilter').value;
          const search = ($('#unSearch').value || '').toLowerCase();
          $$('.username-row').forEach(r => {
            const game = r.dataset.game;
            const name = r.querySelector('span:nth-child(2)').textContent.toLowerCase();
            const matchGame = !gameFilter || game === gameFilter;
            const matchSearch = !search || name.includes(search);
            r.style.display = (matchGame && matchSearch) ? '' : 'none';
          });
        };
        if ($('#unSearch')) $('#unSearch').oninput = filterAndSearch;

        // Searchable game filter dropdown
        if ($('#unGameFilterInput')) {
          const gfInput = $('#unGameFilterInput');
          const gfDrop = $('#unGameFilterDrop');
          const gfHidden = $('#unGameFilter');

          const openGfDrop = () => {
            gfDrop.classList.remove('hidden');
            gfInput.removeAttribute('readonly');
            gfInput.value = '';
            gfInput.placeholder = 'Type to search games...';
            $$('.un-gf-opt').forEach(o => o.style.display = '');
          };
          const closeGfDrop = (label) => {
            gfDrop.classList.add('hidden');
            gfInput.setAttribute('readonly', '');
            gfInput.value = '';
            gfInput.placeholder = label || 'All Games';
          };

          gfInput.onfocus = (e) => { e.stopPropagation(); openGfDrop(); };
          gfInput.onclick = (e) => {
            e.stopPropagation();
            if (gfDrop.classList.contains('hidden')) openGfDrop();
          };
          gfInput.oninput = () => {
            const q = gfInput.value.toLowerCase().split(/\s+/).filter(Boolean);
            $$('.un-gf-opt').forEach(o => {
              if (!o.dataset.val) { o.style.display = ''; return; }
              const name = o.dataset.val.toLowerCase();
              const match = q.length === 0 || q.every(w => name.includes(w));
              o.style.display = match ? '' : 'none';
            });
          };
          $$('.un-gf-opt').forEach(opt => {
            opt.onclick = (e) => {
              e.stopPropagation();
              const val = opt.dataset.val;
              gfHidden.value = val;
              closeGfDrop(val || 'All Games');
              filterAndSearch();
            };
          });
          document.addEventListener('click', (e) => {
            if (!e.target.closest('#unGameFilterWrap')) closeGfDrop(gfHidden.value || 'All Games');
          });
        }

        // Custom level dropdown
        if ($('#unLevelTrigger')) {
          $('#unLevelTrigger').onclick = (e) => {
            e.stopPropagation();
            $('#unLevelDropdown').classList.toggle('hidden');
          };
          $$('.un-level-opt').forEach(opt => {
            opt.onclick = () => {
              const val = opt.dataset.val;
              $('#unAddLevel').value = val;
              $('#unLevelText').textContent = val || 'Select level';
              $('#unLevelText').style.color = val ? 'var(--textPrimary)' : 'var(--textMuted)';
              $('#unLevelDropdown').classList.add('hidden');
            };
          });
          document.addEventListener('click', (e) => {
            if (!e.target.closest('#unLevelWrap')) $('#unLevelDropdown')?.classList.add('hidden');
          });
        }

        // Multi-game tag selection for adding usernames
        let selectedUnGames = [];
        const updateUnGameCount = () => {
          const el = $('#unGameCount');
          if (el) el.textContent = `(${selectedUnGames.length} selected)`;
        };

        if ($('#unAddGameSearch')) {
          $('#unAddGameSearch').oninput = () => {
            const q = $('#unAddGameSearch').value.toLowerCase();
            $$('#unAddGameTags .game-tag').forEach(tag => {
              tag.style.display = tag.dataset.name.toLowerCase().includes(q) ? '' : 'none';
            });
          };
        }

        const sortUnTags = () => {
          const container = $('#unAddGameTags');
          if (!container) return;
          const tags = [...container.querySelectorAll('.game-tag')];
          tags.sort((a,b) => {
            const aS = a.classList.contains('selected') ? 0 : 1;
            const bS = b.classList.contains('selected') ? 0 : 1;
            return aS - bS || a.dataset.name.localeCompare(b.dataset.name);
          });
          tags.forEach(t => container.appendChild(t));
        };
        $$('#unAddGameTags .game-tag').forEach(tag => {
          tag.onclick = () => {
            const name = tag.dataset.name;
            if (selectedUnGames.includes(name)) {
              selectedUnGames = selectedUnGames.filter(n => n !== name);
              tag.classList.remove('selected');
              tag.textContent = name;
            } else {
              selectedUnGames.push(name);
              tag.classList.add('selected');
              tag.textContent = '✓ ' + name;
            }
            updateUnGameCount();
            sortUnTags();
          };
        });

        if ($('#unAddName')) $('#unAddName').onkeydown = (e) => { if (e.key === 'Enter') $('#unAddBtn').click(); };
        $('#unAddBtn').onclick = async () => {
          const name = $('#unAddName').value.trim();
          const level = $('#unAddLevel').value.trim();
          if (selectedUnGames.length === 0 || !name) { alert('Select at least one game and enter a username'); return; }
          const existing = c.usernames || [];
          const dupes = selectedUnGames.filter(gameName => 
            existing.some(u => u.username === name && u.gameName === gameName && u.level === level)
          );
          if (dupes.length > 0) {
            alert('Duplicate user exists!\n\n"' + name + '" with level "' + (level||'none') + '" already exists in:\n• ' + dupes.join('\n• '));
            return;
          }
          for (const gameName of selectedUnGames) {
            await trackedWrite(() => db.collection(`${userPath()}/companies/${cid}/usernames`).add({ gameName, username: name, level }));
          }
          render();
        };

        $$('.un-del').forEach(btn => {
          btn.onclick = async () => {
            if (!confirm('Remove this username?')) return;
            await trackedWrite(() => db.doc(`${userPath()}/companies/${cid}/usernames/${btn.dataset.id}`).delete());
            render();
          };
        });
      }
    }

    // ============================================================
    // COMPANY SETTINGS
    // ============================================================
    function renderCompanySettings(c) {
      const isActive = c.active !== false;
      const compBills = state.bills.filter(b => b.companyId === c._id).sort((a,b) => new Date(b.date)-new Date(a.date));
      return `
        <div class="card" style="margin-bottom:14px">
          <h4 style="font-family:'Orbitron',monospace;font-size:13px;margin-bottom:12px">COMPANY NAME</h4>
          <div id="companyNameDisplay" style="display:flex;align-items:center;gap:10px">
            <span style="font-size:16px;font-weight:700;flex:1">${esc(c.name)}</span>
            <button class="btn btn-ghost btn-sm" id="editCompanyNameBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
              Edit
            </button>
          </div>
          <div id="companyNameEdit" class="hidden" style="display:flex;align-items:center;gap:8px;margin-top:8px">
            <input class="input" id="editCompanyNameInput" value="${esc(c.name)}" style="flex:1" />
            <button class="btn btn-green btn-sm" id="saveCompanyName">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
            </button>
            <button class="btn btn-ghost btn-sm" id="cancelCompanyName">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
        <div class="card" style="margin-bottom:14px">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <h4 style="font-family:'Orbitron',monospace;font-size:13px;margin-bottom:4px">COMPANY STATUS</h4>
              <p style="font-size:12px;color:var(--textMuted)">Toggle active / inactive</p>
            </div>
            <div class="toggle" id="activeToggle">
              <div class="toggle-track ${isActive?'on':'off'}"><div class="toggle-thumb"></div></div>
              <span class="toggle-label" style="color:${isActive?'var(--green)':'var(--textSecondary)'}">${isActive?'Active':'Inactive'}</span>
            </div>
          </div>
        </div>
        <div class="card" style="margin-bottom:14px">
          <h4 style="font-family:'Orbitron',monospace;font-size:13px;margin-bottom:4px">GENERATE REPORT</h4>
          <p style="font-size:11px;color:var(--textMuted);margin-bottom:12px">Transaction & P/L Report</p>
          <div style="display:flex;gap:16px;margin-bottom:16px;padding:14px;border-radius:10px;background:rgba(15,12,28,0.5);border:1px solid var(--glassBorder)">
            <div style="flex:1;text-align:center">
              <div style="font-size:10px;color:var(--textMuted);text-transform:uppercase;margin-bottom:2px">Total Revenue</div>
              <div id="settingsRevenue" style="font-size:16px;font-weight:700;color:#34d399;font-family:'Orbitron',monospace">$0</div>
            </div>
            <div style="width:1px;background:var(--glassBorder)"></div>
            <div style="flex:1;text-align:center">
              <div style="font-size:10px;color:var(--textMuted);text-transform:uppercase;margin-bottom:2px">Profit / Loss</div>
              <div id="settingsPL" style="font-size:16px;font-weight:700;font-family:'Orbitron',monospace">$0</div>
            </div>
          </div>
          <button class="btn btn-green btn-full" id="downloadReport" style="justify-content:center">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Generate Report
          </button>
        </div>
        <div class="card" style="border-color:rgba(239,68,68,0.25)">
          <h4 style="font-family:'Orbitron',monospace;font-size:13px;margin-bottom:4px;color:var(--red)">DANGER ZONE</h4>
          <p style="font-size:12px;color:var(--textMuted);margin-bottom:14px">Permanently delete this company and all its assigned games, usernames, and bills.</p>
          <button class="btn btn-red" id="deleteCompanyBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            Delete Company
          </button>
        </div>
      `;
    }

    function bindCompanySettings() {
      const c = state.companies[state.selectedCompanyId];
      if (!c) return;

      // Calculate and display P/L summary
      const compBills = state.bills.filter(b => b.companyId === c._id);
      let totalRev = 0, totalPL = 0;
      for (const bill of compBills) {
        totalRev += (bill.totalDollars || 0);
        for (const item of (bill.items||[])) {
          const sellR = getGameRate(c, item.gameName) || 0;
          const costR = getCostRate(item.gameName);
          const sp = (item.points||0) * (sellR/100);
          const cp = (item.points||0) * (costR/100);
          totalPL += sp - cp;
        }
      }
      if ($('#settingsRevenue')) $('#settingsRevenue').textContent = '$' + totalRev.toFixed(2);
      if ($('#settingsPL')) {
        const plEl = $('#settingsPL');
        plEl.textContent = (totalPL>=0?'+':'') + '$' + totalPL.toFixed(2);
        plEl.style.color = totalPL >= 0 ? '#34d399' : 'var(--red)';
      }

      // Edit company name
      $('#editCompanyNameBtn').onclick = () => {
        $('#companyNameDisplay').classList.add('hidden');
        const editDiv = $('#companyNameEdit');
        editDiv.classList.remove('hidden');
        editDiv.style.display = 'flex';
        $('#editCompanyNameInput').focus();
      };
      $('#cancelCompanyName').onclick = () => {
        $('#companyNameDisplay').classList.remove('hidden');
        $('#companyNameEdit').classList.add('hidden');
      };
      $('#saveCompanyName').onclick = async () => {
        const newName = $('#editCompanyNameInput').value.trim();
        if (!newName) return;
        await trackedWrite(() => db.doc(`${userPath()}/companies/${c._id}`).update({ name: newName }));
        render();
      };
      $('#editCompanyNameInput').onkeydown = (e) => {
        if (e.key === 'Enter') $('#saveCompanyName').click();
        if (e.key === 'Escape') $('#cancelCompanyName').click();
      };

      // Toggle active
      $('#activeToggle').onclick = async () => {
        const newVal = c.active === false ? true : false;
        await trackedWrite(() => db.doc(`${userPath()}/companies/${c._id}`).update({ active: newVal }));
        render();
      };

      // Download report
      $('#downloadReport').onclick = () => { showReportDatePicker('company', c._id); };

      // Delete company
      $('#deleteCompanyBtn').onclick = async () => {
        if (!confirm('Delete company "' + c.name + '" and all its data? This cannot be undone.')) return;
        try {
          // Delete subcollections first
          const agSnap = await db.collection(`${userPath()}/companies/${c._id}/assignedGames`).get();
          for (const doc of agSnap.docs) await doc.ref.delete();
          const unSnap = await db.collection(`${userPath()}/companies/${c._id}/usernames`).get();
          for (const doc of unSnap.docs) await doc.ref.delete();
          // Delete company doc
          await trackedWrite(() => db.doc(`${userPath()}/companies/${c._id}`).delete());
          state.view = 'companies';
          state.selectedCompanyId = null;
          render();
        } catch (e) {
          alert('Delete failed: ' + e.message);
        }
      };
    }

    // ============================================================
    // AUTH STATE LISTENER
    // ============================================================
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        state.user = {
          uid: user.uid,
          email: user.email,
          displayName: user.displayName,
          photoURL: user.photoURL,
        };
        state.view = 'loading';
        render();
        await loadAllData(true);
        setupListeners();
        state.view = 'companies';
        render();
      } else {
        stopListeners();
        state.user = null;
        state.view = 'login';
        state.companies = {};
        state.masterGames = [];
        state.bills = [];
        render();
      }
    });


    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'gamebill-v1';
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])).catch(()=>{}));
          self.skipWaiting();
        });
        self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
        self.addEventListener('fetch', e => {
          if (e.request.method !== 'GET') return;
          e.respondWith(
            fetch(e.request).then(r => {
              if (r.ok) { const c=r.clone(); caches.open(CACHE).then(cache=>cache.put(e.request,c)).catch(()=>{}); }
              return r;
            }).catch(() => caches.match(e.request))
          );
        });
      `;
      // Register SW from blob
      try {
        const swBlob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl).catch(e => console.log('SW:', e.message));
      } catch(e) {
        console.log('SW registration:', e.message);
      }
    }
    // Initial render
    render();
  </script>
</body>

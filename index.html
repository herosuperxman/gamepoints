<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Points Manager</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --bgCard: #13111f;
      --bgInput: #1a1728;
      --bgHover: #1e1b30;
      --purple: #7c3aed;
      --purpleLight: #a78bfa;
      --purpleDark: #1a0a3e;
      --cyan: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --pink: #ec4899;
      --blue: #3b82f6;
      --textPrimary: #f4f2fa;
      --textSecondary: #b8b0d0;
      --textMuted: #8078a0;
      --border: #2a2540;
      --borderLight: #3a3455;
    }

    body {
      background: var(--bg);
      color: var(--textPrimary);
      font-family: 'Rajdhani', 'Exo 2', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(6,182,212,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(236,72,153,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #app { position: relative; z-index: 1; }

    h1, h2, h3, h4, .heading { font-family: 'Orbitron', monospace; letter-spacing: 1px; }
    input, select, textarea, button { font-family: 'Rajdhani', sans-serif; font-weight: 500; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--purple); }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }

    /* HEADER */
    .header {
      background: var(--bgCard); border-bottom: 1px solid var(--border);
      padding: 0 16px; height: 56px; display: flex; align-items: center;
      justify-content: space-between; backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .header-logo-icon {
      width:34px; height:34px; border-radius:8px;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      display:flex; align-items:center; justify-content:center; color:#fff; font-size:17px;
    }
    .header-logo-text { font-family:'Orbitron',monospace; font-size:15px; font-weight:900; color:var(--purpleLight); letter-spacing:2px; }
    .header-actions { display:flex; align-items:center; gap:8px; }

    /* UTILITY BAR */
    .utility-bar {
      background: var(--bgCard); border-bottom: 1px solid var(--border);
      padding: 8px 16px; display: flex; align-items: center; justify-content: center;
      gap: 6px; position: sticky; top: 56px; z-index: 99;
      backdrop-filter: blur(12px);
    }
    .util-btn {
      padding: 6px 14px; font-size: 12px; font-weight: 600; border: none;
      border-radius: 8px; cursor: pointer; display: inline-flex;
      align-items: center; gap: 6px; transition: all 0.2s;
      font-family: 'Rajdhani', sans-serif; text-transform: uppercase;
      letter-spacing: 0.5px; background: var(--bgInput);
      color: var(--textSecondary); border: 1px solid var(--border);
    }
    .util-btn:hover { border-color: var(--purple); background: var(--bgHover); color: var(--textPrimary); transform: translateY(-1px); }
    .util-btn:active { transform: translateY(0); }
    .util-btn svg { width:15px; height:15px; flex-shrink:0; }
    .util-btn.syncing { animation: pulse 1s infinite; }

    /* BUTTONS */
    .btn {
      padding: 7px 14px; font-size: 13px; font-weight: 600; border: none; border-radius: 8px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
      transition: all 0.2s; letter-spacing: 0.5px; text-transform: uppercase;
      font-family: 'Rajdhani', sans-serif; white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn:active { transform: translateY(0); }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-cyan { background: var(--cyan); color: #fff; }
    .btn-green { background: var(--green); color: #fff; }
    .btn-red { background: var(--red); color: #fff; }
    .btn-orange { background: var(--orange); color: #000; }
    .btn-pink { background: var(--pink); color: #fff; }
    .btn-ghost { background: transparent; color: var(--textSecondary); }
    .btn-ghost:hover { background: var(--bgHover); }
    .btn-outline-purple { background:transparent; border:1px solid var(--purple); color:var(--purpleLight); }
    .btn-outline-purple:hover { background: rgba(124,58,237,0.15); }
    .btn-outline-cyan { background:transparent; border:1px solid var(--cyan); color:var(--cyan); }
    .btn-outline-cyan:hover { background: rgba(6,182,212,0.15); }
    .btn-outline-green { background:transparent; border:1px solid var(--green); color:var(--green); }
    .btn-outline-red { background:transparent; border:1px solid var(--red); color:var(--red); }
    .btn-outline-orange { background:transparent; border:1px solid var(--orange); color:var(--orange); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-lg { padding: 10px 20px; font-size: 15px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-full { width: 100%; justify-content: center; }

    /* INPUTS */
    .input {
      width: 100%; padding: 9px 12px; background: var(--bgInput);
      border: 1px solid var(--border); border-radius: 8px; color: var(--textPrimary);
      font-size: 14px; font-weight: 500; outline: none; transition: border-color 0.2s;
    }
    .input:focus { border-color: var(--purple); }
    .input::placeholder { color: var(--textMuted); }
    .input-search { padding-left: 34px; }

    /* CARD */
    .card {
      background: var(--bgCard); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px;
    }

    /* BADGE */
    .badge {
      display:inline-flex; align-items:center; padding:2px 10px; border-radius:20px;
      font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
    }
    .badge-purple { background:rgba(124,58,237,0.13); color:#a78bfa; border:1px solid rgba(124,58,237,0.25); }
    .badge-green { background:rgba(16,185,129,0.13); color:#6ee7b7; border:1px solid rgba(16,185,129,0.25); }
    .badge-red { background:rgba(239,68,68,0.13); color:#fca5a5; border:1px solid rgba(239,68,68,0.25); }
    .badge-orange { background:rgba(245,158,11,0.13); color:#fcd34d; border:1px solid rgba(245,158,11,0.25); }
    .badge-cyan { background:rgba(6,182,212,0.13); color:#67e8f9; border:1px solid rgba(6,182,212,0.25); }
    .badge-pink { background:rgba(236,72,153,0.13); color:#f9a8d4; border:1px solid rgba(236,72,153,0.25); }

    /* LABEL */
    .label {
      font-size: 11px; color: var(--textSecondary); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 4px; display: block; font-weight: 600;
    }

    /* MODAL */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
      display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px;
    }
    .modal {
      background:var(--bgCard); border:1px solid var(--border); border-radius:16px;
      padding:24px; width:100%; max-width:550px; max-height:80vh; overflow-y:auto;
    }
    .modal-header {
      display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;
    }
    .modal-title { font-family:'Orbitron',monospace; font-size:17px; color:var(--purpleLight); }

    /* DROPDOWN */
    .dropdown { position: relative; }
    .dropdown-trigger {
      padding:9px 12px; background:var(--bgInput); border:1px solid var(--border);
      border-radius:8px; cursor:pointer; display:flex; justify-content:space-between;
      align-items:center; color:var(--textPrimary); font-size:14px; font-weight:500;
      transition: border-color 0.2s; min-height: 40px;
    }
    .dropdown-trigger:hover { border-color: var(--purple); }
    .dropdown-trigger.open { border-color: var(--purple); }
    .dropdown-trigger .placeholder { color: var(--textMuted); }
    .dropdown-menu {
      position:absolute; top:calc(100% + 4px); left:0; right:0;
      background:var(--bgCard); border:1px solid var(--border); border-radius:8px;
      z-index:50; max-height:220px; overflow-y:auto;
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
    }
    .dropdown-item {
      padding:9px 12px; cursor:pointer; display:flex; align-items:center;
      justify-content:space-between; font-size:13px; transition:background 0.15s;
      color: var(--textPrimary);
    }
    .dropdown-item:hover { background: var(--bgHover); }
    .dropdown-item.selected { background: rgba(124,58,237,0.13); color: var(--purpleLight); }
    .dropdown-search { padding:8px; border-bottom:1px solid var(--border); }
    .dropdown-empty { padding:12px; color:var(--textMuted); font-size:13px; text-align:center; }

    /* TOGGLE */
    .toggle { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .toggle-track {
      width:44px; height:24px; border-radius:12px; position:relative;
      transition: background 0.2s; border: 1px solid var(--border);
    }
    .toggle-track.on { background:var(--green); border-color:rgba(16,185,129,0.4); }
    .toggle-track.off { background:rgba(239,68,68,0.25); }
    .toggle-thumb {
      width:18px; height:18px; border-radius:50%; position:absolute; top:2px;
      transition: left 0.2s, background 0.2s;
    }
    .toggle-track.on .toggle-thumb { left:22px; background:#fff; }
    .toggle-track.off .toggle-thumb { left:2px; background:var(--textMuted); }
    .toggle-label { font-size:14px; font-weight:600; }

    /* SEARCH WRAPPER */
    .search-wrap { position: relative; }
    .search-icon {
      position:absolute; left:10px; top:50%; transform:translateY(-50%);
      color:var(--textMuted); font-size:14px; pointer-events:none;
    }

    /* COMPANY LIST */
    .company-item {
      display:flex; align-items:center; padding:13px 16px; background:var(--bgCard);
      border:1px solid var(--border); border-radius:12px; margin-bottom:8px;
      cursor:pointer; transition: all 0.2s;
    }
    .company-item:hover {
      border-color: var(--purple); background: var(--bgHover);
      transform: translateX(4px);
    }
    .company-item.inactive { opacity: 0.6; }
    .company-item.inactive:hover { opacity: 1; }
    .company-icon { font-size:20px; margin-right:12px; }
    .company-name { flex:1; font-size:16px; font-weight:600; }

    /* TABS */
    .tabs {
      display:flex; gap:4px; margin-bottom:22px; background:var(--bgInput);
      border-radius:12px; padding:4px;
    }
    .tab {
      flex:1; padding:11px 14px; border-radius:10px; border:none;
      cursor:pointer; font-size:13px; font-weight:700; font-family:'Orbitron',monospace;
      display:flex; align-items:center; justify-content:center; gap:7px;
      transition:all 0.2s; text-transform:uppercase; letter-spacing:0.5px;
      background: transparent; color: var(--textSecondary);
    }
    .tab.active { color: #fff; }
    .tab.active.tab-green { background: var(--green); }
    .tab.active.tab-cyan { background: var(--cyan); }
    .tab.active.tab-purple { background: var(--purple); }

    /* SUBTABS */
    .subtabs {
      display:flex; gap:4px; margin-bottom:18px; background:var(--bgInput);
      border-radius:10px; padding:4px;
    }
    .subtab {
      flex:1; padding:9px 14px; border-radius:8px; border:none;
      cursor:pointer; font-size:13px; font-weight:600;
      font-family:'Rajdhani',sans-serif; text-transform:uppercase;
      transition:all 0.2s; background:transparent; color:var(--textSecondary);
      display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .subtab.active { background:var(--purple); color:#fff; }

    /* BILL ITEM */
    .bill-item { margin-bottom: 8px; }
    .bill-item .card { padding: 14px; }
    .bill-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .bill-result {
      margin-top:8px; padding:6px 10px; border-radius:6px;
      background:var(--bgInput); display:flex; gap:16px; font-size:13px;
    }
    .bill-result .pts { color: var(--cyan); }
    .bill-result .amt { color: var(--green); }
    .bill-result .rate { color: var(--textMuted); }

    /* TOTALS */
    .totals-card {
      background: linear-gradient(135deg, var(--purpleDark), var(--bgCard));
      border: 1px solid rgba(124,58,237,0.25);
    }

    /* GAME TAG */
    .game-tag {
      padding:5px 12px; border-radius:8px; border:1px solid var(--border);
      background:var(--bgInput); color:var(--textSecondary); cursor:pointer;
      font-size:13px; font-weight:600; transition:all 0.15s; display:inline-block;
      margin: 3px;
    }
    .game-tag.selected { border-color:var(--purple); background:rgba(124,58,237,0.2); color:var(--purpleLight); }
    .game-tag:hover { border-color:var(--purple); }

    /* ASSIGNED GAME ROW */
    .assigned-row {
      display:flex; align-items:center; padding:11px 14px; background:var(--bgCard);
      border:1px solid var(--border); border-radius:10px; margin-bottom:6px;
      transition: border-color 0.2s;
    }
    .assigned-row:hover { border-color: rgba(124,58,237,0.4); }

    /* USERNAME ROW */
    .username-row {
      display:flex; align-items:center; padding:9px 12px; background:var(--bgCard);
      border:1px solid var(--border); border-radius:8px; margin-bottom:5px;
    }

    /* BILL HISTORY ITEM */
    .bill-history-item {
      padding:10px 14px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:12px;
    }

    /* CONVERSION TOGGLE */
    .conv-toggle {
      display:inline-flex; align-items:center; gap:8px; padding:8px 16px;
      border-radius:10px; cursor:pointer; user-select:none; transition:all 0.3s;
    }
    .conv-toggle .conv-label {
      font-family:'Orbitron',monospace; font-size:14px; font-weight:700;
    }

    /* PAYMENT BUTTONS */
    .payment-btns { display: flex; gap: 8px; flex-wrap: wrap; }

    /* PAGE */
    .page { max-width: 750px; margin: 0 auto; padding: 20px 16px; }

    /* LOGIN */
    .login-page {
      min-height:100vh; display:flex; align-items:center;
      justify-content:center; padding:20px;
    }
    .login-box { text-align:center; max-width:400px; width:100%; }
    .login-logo {
      width:80px; height:80px; margin:0 auto 20px; border-radius:20px;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      display:flex; align-items:center; justify-content:center; font-size:40px;
      box-shadow: 0 0 40px rgba(124,58,237,0.3);
    }
    .login-title {
      font-family:'Orbitron',monospace; font-size:26px; font-weight:800;
      background: linear-gradient(135deg, var(--purpleLight), var(--cyan));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:8px;
    }
    .login-subtitle { color:var(--textSecondary); font-size:15px; margin-bottom:28px; }
    .google-btn {
      width:100%; padding:13px 24px; border-radius:12px;
      border:1px solid var(--border); background:var(--bgInput);
      color:var(--textPrimary); font-size:15px; font-weight:600;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      gap:12px; transition:all 0.2s; font-family:'Rajdhani',sans-serif;
    }
    .google-btn:hover { border-color:var(--purple); background:var(--bgHover); }

    /* LOADING */
    .loading-page {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
    }
    .spinner {
      width:40px; height:40px; border:3px solid var(--border);
      border-top:3px solid var(--purple); border-radius:50%;
      animation: spin 0.8s linear infinite; margin:0 auto 14px;
    }

    /* ACCOUNT DROPDOWN */
    .account-trigger {
      display:flex; align-items:center; gap:7px; cursor:pointer; padding:4px 8px;
      border-radius:8px; border:1px solid var(--border); transition:background 0.2s;
    }
    .account-trigger:hover { background:var(--bgHover); }
    .account-avatar { width:26px; height:26px; border-radius:50%; }
    .account-name {
      font-size:12px; color:var(--textSecondary); max-width:100px;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .account-menu {
      position:absolute; top:calc(100% + 8px); right:0;
      background:var(--bgCard); border:1px solid var(--border);
      border-radius:12px; padding:8px; min-width:200px;
      box-shadow:0 8px 32px rgba(0,0,0,0.5); z-index:101;
    }
    .account-menu-item {
      padding:8px 12px; cursor:pointer; border-radius:6px;
      display:flex; align-items:center; gap:8px; font-size:13px;
      color:var(--textSecondary); transition:background 0.15s;
    }
    .account-menu-item:hover { background:var(--bgHover); }
    .account-menu-item.danger { color:var(--red); }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .bill-grid { grid-template-columns: 1fr; }
      .tabs { font-size: 11px; }
      .tab { font-size: 11px; padding: 9px 8px; }
      .util-btn span.util-label { display: none; }
      .util-btn { padding: 6px 10px; }
      .header-logo-text { font-size: 13px; letter-spacing: 1px; }
    }

    /* Hide */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ============================================================
    // FIREBASE INIT
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyAKY98IRdR0jZRWvRWY0FGIuacugGO52B4",
      authDomain: "points-calculate.firebaseapp.com",
      projectId: "points-calculate",
      storageBucket: "points-calculate.firebasestorage.app",
      messagingSenderId: "331918477352",
      appId: "1:331918477352:web:e42fa232ca7c028cac4d1d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ============================================================
    // STATE
    // ============================================================
    const state = {
      user: null,
      view: 'loading', // loading, login, companies, company
      companies: {},
      masterGames: [],
      bills: [],
      selectedCompanyId: null,
      companyTab: 'billing',
      gamesSubTab: 'rates',
      billItems: [],
      convMode: 'pts2dollar',
      paymentStatus: 'received',
      partialAmount: '',
      recentUsernames: [],
      masterGamesModalOpen: false,
      accountMenuOpen: false,
    };

    // ============================================================
    // FIREBASE DATA HELPERS
    // ============================================================
    function userPath() {
      return `users/${state.user.uid}`;
    }

    async function loadAllData() {
      if (!state.user) return;
      try {
        // Load master games
        const mgSnap = await db.collection(`${userPath()}/masterGames`).get();
        state.masterGames = mgSnap.docs.map(d => ({ _id: d.id, ...d.data() }));

        // Load bills
        const billSnap = await db.collection(`${userPath()}/bills`).get();
        state.bills = billSnap.docs.map(d => ({ _id: d.id, ...d.data() }));

        // Load companies with subcollections
        const compSnap = await db.collection(`${userPath()}/companies`).get();
        state.companies = {};
        for (const doc of compSnap.docs) {
          const cData = { _id: doc.id, ...doc.data() };
          const agSnap = await db.collection(`${userPath()}/companies/${doc.id}/assignedGames`).get();
          cData.assignedGames = agSnap.docs.map(d => ({ _id: d.id, ...d.data() }));
          const unSnap = await db.collection(`${userPath()}/companies/${doc.id}/usernames`).get();
          cData.usernames = unSnap.docs.map(d => ({ _id: d.id, ...d.data() }));
          state.companies[doc.id] = cData;
        }
      } catch (e) {
        console.error('Load error:', e);
      }
    }

    // ============================================================
    // UTILITY
    // ============================================================
    function $(sel, parent) { return (parent || document).querySelector(sel); }
    function $$(sel, parent) { return Array.from((parent || document).querySelectorAll(sel)); }
    function html(str) { const t = document.createElement('template'); t.innerHTML = str.trim(); return t.content; }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function genId() { return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7); }

    // ============================================================
    // RENDER ENGINE
    // ============================================================
    function render() {
      const app = $('#app');
      switch (state.view) {
        case 'loading': app.innerHTML = renderLoading(); break;
        case 'login': app.innerHTML = renderLogin(); bindLogin(); break;
        case 'companies': app.innerHTML = renderHeader() + renderCompanyList(); bindHeader(); bindCompanyList(); break;
        case 'company': app.innerHTML = renderHeader() + renderCompanyScreen(); bindHeader(); bindCompanyScreen(); break;
      }
      if (state.masterGamesModalOpen) { renderMasterGamesModal(); bindMasterGamesModal(); }
    }

    async function doExport() {
      const data = { masterGames: state.masterGames, companies: state.companies, bills: state.bills };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `points_manager_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }

    function doImport() {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (data.masterGames) {
            for (const g of data.masterGames) {
              const { _id, ...rest } = g;
              await db.doc(`${userPath()}/masterGames/${_id}`).set(rest);
            }
          }
          if (data.companies) {
            for (const [cid, cdata] of Object.entries(data.companies)) {
              const { _id, assignedGames, usernames, ...compInfo } = cdata;
              await db.doc(`${userPath()}/companies/${cid}`).set(compInfo);
              if (assignedGames) for (const ag of assignedGames) {
                const { _id: aid, ...agRest } = ag;
                await db.doc(`${userPath()}/companies/${cid}/assignedGames/${aid}`).set(agRest);
              }
              if (usernames) for (const un of usernames) {
                const { _id: uid2, ...unRest } = un;
                await db.doc(`${userPath()}/companies/${cid}/usernames/${uid2}`).set(unRest);
              }
            }
          }
          await loadAllData();
          render();
          alert('Data imported successfully!');
        } catch (er) { alert('Import failed: ' + er.message); }
      };
      input.click();
    }

    function doFullReport() {
      // Generate CSV with ALL companies data in one sheet
      let csv = 'Company,Status,Game,Rate(%),Username,Level,Date,Points,Amount($),Type,Payment Status,Amount Received,Balance Due\n';
      const companies = Object.values(state.companies);
      const bills = state.bills;

      // First add all bill transactions
      for (const comp of companies) {
        const compBills = bills.filter(b => b.companyId === comp._id);
        if (compBills.length > 0) {
          for (const bill of compBills) {
            for (const item of (bill.items || [])) {
              const type = (item.points || 0) < 0 ? 'Redeem' : 'Load';
              csv += `"${comp.name}","${comp.active!==false?'Active':'Inactive'}","${item.gameName||''}","${getGameRate(comp, item.gameName)}","${item.username||''}","${getUserLevel(comp, item.username, item.gameName)}","${new Date(bill.date).toLocaleString()}",${(item.points||0).toFixed(2)},${(item.dollars||0).toFixed(2)},"${type}","${bill.paymentStatus}",${bill.partialAmount||0},${bill.balanceDue||0}\n`;
            }
          }
        } else {
          // Still list the company even if no bills
          csv += `"${comp.name}","${comp.active!==false?'Active':'Inactive'}","","","","","",0,0,"","",0,0\n`;
        }
      }

      // Add summary section
      csv += '\n\nSUMMARY BY COMPANY\n';
      csv += 'Company,Total Points Loaded,Total Points Redeemed,Total Amount($),Total Received($),Total Balance Due($)\n';
      for (const comp of companies) {
        const compBills = bills.filter(b => b.companyId === comp._id);
        let loaded = 0, redeemed = 0, totalAmt = 0, totalReceived = 0, totalDue = 0;
        for (const bill of compBills) {
          for (const item of (bill.items || [])) {
            if ((item.points || 0) >= 0) loaded += (item.points || 0);
            else redeemed += Math.abs(item.points || 0);
          }
          totalAmt += (bill.totalDollars || 0);
          totalReceived += (bill.partialAmount || 0);
          totalDue += (bill.balanceDue || 0);
        }
        csv += `"${comp.name}",${loaded.toFixed(2)},${redeemed.toFixed(2)},${totalAmt.toFixed(2)},${totalReceived.toFixed(2)},${totalDue.toFixed(2)}\n`;
      }

      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `full_report_all_companies_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function getGameRate(company, gameName) {
      const ag = (company.assignedGames || []).find(g => g.gameName === gameName);
      return ag ? (ag.rate || 0) : '';
    }

    function getUserLevel(company, username, gameName) {
      const un = (company.usernames || []).find(u => u.username === username && u.gameName === gameName);
      return un ? (un.level || '') : '';
    }

      const isActive = c.active !== false;
      return `<div class="page fade-in">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
          <button class="btn btn-ghost btn-sm" id="backBtn">◀</button>
          <div>
            <h2 style="font-family:'Orbitron',monospace;font-size:18px;color:var(--purpleLight)">${esc(c.name)}</h2>
            <span class="badge ${isActive ? 'badge-green' : 'badge-red'}">${isActive ? 'Active' : 'Inactive'}</span>
          </div>
        </div>
        <div class="tabs">
          <button class="tab tab-green ${state.companyTab==='billing'?'active':''}" data-tab="billing">💰 Billing</button>
          <button class="tab tab-cyan ${state.companyTab==='games'?'active':''}" data-tab="games">🎮 Games & Rates</button>
          <button class="tab tab-purple ${state.companyTab==='settings'?'active':''}" data-tab="settings">⚙️ Settings</button>
        </div>
        <div id="tabContent">
          ${state.companyTab === 'billing' ? renderBilling(c) : ''}
          ${state.companyTab === 'games' ? renderGamesRates(c) : ''}
          ${state.companyTab === 'settings' ? renderCompanySettings(c) : ''}
        </div>
      </div>`;
    }

    function bindCompanyScreen() {
      $('#backBtn').onclick = () => { state.view = 'companies'; state.selectedCompanyId = null; render(); };
      $$('.tab').forEach(t => {
        t.onclick = () => { state.companyTab = t.dataset.tab; render(); };
      });
      if (state.companyTab === 'billing') bindBilling();
      if (state.companyTab === 'games') bindGamesRates();
      if (state.companyTab === 'settings') bindCompanySettings();
    }

    // ============================================================
    // BILLING
    // ============================================================
    function renderBilling(c) {
      const mode = state.convMode;
      const items = state.billItems;
      const assignedGames = c.assignedGames || [];
      const usernames = c.usernames || [];

      let totalPts = 0, totalDollars = 0;
      items.forEach(item => {
        const calc = calcLine(item);
        totalPts += calc.points;
        totalDollars += calc.dollars;
      });

      return `
        <div class="conv-toggle" id="convToggle" style="margin-bottom:18px;
          background:linear-gradient(135deg,${mode==='pts2dollar'?'rgba(6,182,212,0.13)':'rgba(16,185,129,0.13)'},transparent);
          border:1px solid ${mode==='pts2dollar'?'rgba(6,182,212,0.25)':'rgba(16,185,129,0.25)'};">
          <span class="conv-label" style="color:${mode==='pts2dollar'?'var(--cyan)':'var(--green)'}">
            ${mode==='pts2dollar'?'PTS → $':'$ → PTS'}
          </span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${mode==='pts2dollar'?'var(--cyan)':'var(--green)'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform 0.3s;${mode==='dollar2pts'?'transform:rotate(180deg)':''}"><polyline points="17,1 21,5 17,9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7,23 3,19 7,15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
        </div>

        <div id="billItemsContainer">
          ${items.map((item, idx) => renderBillItem(item, idx, assignedGames, usernames)).join('')}
        </div>

        <button class="btn btn-outline-cyan btn-full" id="addBillItem" style="margin-bottom:18px">➕ Add Game to Bill</button>

        ${items.length > 0 ? `
          <div class="card totals-card" style="margin-bottom:14px">
            <div style="font-family:'Orbitron',monospace;font-size:12px;color:var(--textMuted);margin-bottom:10px">TOTAL</div>
            <div style="display:flex;gap:24px;margin-bottom:14px">
              <div>
                <div style="font-size:11px;color:var(--textMuted);text-transform:uppercase">Points</div>
                <div style="font-size:20px;font-weight:700;color:var(--cyan);font-family:'Orbitron',monospace">${totalPts.toFixed(2)}</div>
              </div>
              <div>
                <div style="font-size:11px;color:var(--textMuted);text-transform:uppercase">Amount</div>
                <div style="font-size:20px;font-weight:700;color:var(--green);font-family:'Orbitron',monospace">$${totalDollars.toFixed(2)}</div>
              </div>
            </div>
            <div style="border-top:1px solid var(--border);padding-top:12px">
              <span class="label" style="margin-bottom:8px">Payment Status</span>
              <div class="payment-btns">
                <button class="btn ${state.paymentStatus==='received'?'btn-green':'btn-outline-green'} btn-sm" data-pay="received">Received Full</button>
                <button class="btn ${state.paymentStatus==='partial'?'btn-orange':'btn-outline-orange'} btn-sm" data-pay="partial">Partial</button>
                <button class="btn ${state.paymentStatus==='not_received'?'btn-red':'btn-outline-red'} btn-sm" data-pay="not_received">Not Received</button>
              </div>
              ${state.paymentStatus === 'partial' ? `
                <div style="margin-top:8px;max-width:200px">
                  <input class="input" type="number" id="partialAmountInput" placeholder="Amount received" value="${esc(state.partialAmount)}" />
                </div>
              ` : ''}
              ${state.paymentStatus !== 'received' ? `
                <div style="margin-top:8px;color:var(--orange);font-weight:600">
                  Balance Due: $${(totalDollars - (state.paymentStatus === 'partial' ? (parseFloat(state.partialAmount)||0) : 0)).toFixed(2)}
                </div>
              ` : ''}
            </div>
            <div style="display:flex;gap:8px;margin-top:14px">
              <button class="btn btn-cyan" id="copyBill">📋 Copy Bill</button>
              <button class="btn btn-green" id="saveBill">💾 Save Bill</button>
            </div>
          </div>
        ` : ''}
        <div id="billSavedMsg" class="hidden" style="margin-top:10px">
          <div class="card" style="background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.2)">
            <span style="color:var(--green);font-weight:600">✓ Bill saved successfully!</span>
          </div>
        </div>
      `;
    }

    function renderBillItem(item, idx, assignedGames, usernames) {
      const calc = calcLine(item);
      const gameOptions = assignedGames.map(g => `<option value="${g._id}" ${item.gameId===g._id?'selected':''}>${esc(g.gameName)}</option>`).join('');
      const gameUsernames = item.gameId ? usernames.filter(u => {
        const ag = assignedGames.find(g => g._id === item.gameId);
        return ag && u.gameName === ag.gameName;
      }) : [];
      // Sort: recent first
      const sorted = [...gameUsernames].sort((a, b) => {
        const ai = state.recentUsernames.indexOf(a.username);
        const bi = state.recentUsernames.indexOf(b.username);
        if (ai >= 0 && bi >= 0) return ai - bi;
        if (ai >= 0) return -1;
        if (bi >= 0) return 1;
        return 0;
      });
      const unOptions = sorted.map(u =>
        `<option value="${esc(u.username)}" ${item.username===u.username?'selected':''}>${esc(u.username)}${u.level?' ['+esc(u.level)+']':''}${state.recentUsernames.includes(u.username)?' ★':''}</option>`
      ).join('');

      return `<div class="bill-item card" style="margin-bottom:8px;padding:14px" data-idx="${idx}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <span style="font-family:'Orbitron',monospace;font-size:11px;color:var(--textMuted)">#${idx+1}</span>
          <div style="flex:1"></div>
          <button class="btn btn-ghost btn-sm bill-remove" data-idx="${idx}" style="color:var(--red)">🗑️</button>
        </div>
        <div class="bill-grid">
          <div>
            <span class="label">Game</span>
            <select class="input bill-game-select" data-idx="${idx}">
              <option value="">Select game</option>
              ${gameOptions}
            </select>
          </div>
          <div>
            <span class="label">Username</span>
            <select class="input bill-user-select" data-idx="${idx}">
              <option value="">Select user</option>
              ${unOptions}
            </select>
          </div>
          <div>
            <span class="label">${state.convMode==='pts2dollar'?'Points':'Amount ($)'}</span>
            <input class="input bill-value-input" data-idx="${idx}" type="number" placeholder="${state.convMode==='pts2dollar'?'Enter points':'Enter amount'}" value="${item.value}" />
          </div>
        </div>
        ${item.value ? `<div class="bill-result">
          <span class="pts"><strong>Pts:</strong> ${calc.points.toFixed(2)}</span>
          <span class="amt"><strong>$:</strong> ${calc.dollars.toFixed(2)}</span>
          <span class="rate">Rate: ${item.rate}%</span>
        </div>` : ''}
      </div>`;
    }

    function calcLine(item) {
      const val = parseFloat(item.value) || 0;
      const rate = item.rate || 0;
      if (state.convMode === 'pts2dollar') {
        return { points: val, dollars: rate ? val * rate : 0 };
      } else {
        return { dollars: val, points: rate ? val / rate : 0 };
      }
    }

    function bindBilling() {
      const c = state.companies[state.selectedCompanyId];
      if (!c) return;

      $('#convToggle').onclick = () => {
        state.convMode = state.convMode === 'pts2dollar' ? 'dollar2pts' : 'pts2dollar';
        render();
      };

      $('#addBillItem').onclick = () => {
        state.billItems.push({ id: genId(), gameId: '', gameName: '', username: '', value: '', rate: 0 });
        render();
      };

      $$('.bill-remove').forEach(btn => {
        btn.onclick = () => { state.billItems.splice(parseInt(btn.dataset.idx), 1); render(); };
      });

      $$('.bill-game-select').forEach(sel => {
        sel.onchange = () => {
          const idx = parseInt(sel.dataset.idx);
          const gameId = sel.value;
          state.billItems[idx].gameId = gameId;
          state.billItems[idx].username = '';
          const ag = (c.assignedGames || []).find(g => g._id === gameId);
          if (ag) {
            state.billItems[idx].gameName = ag.gameName;
            state.billItems[idx].rate = ag.rate || 0;
          }
          render();
        };
      });

      $$('.bill-user-select').forEach(sel => {
        sel.onchange = () => {
          const idx = parseInt(sel.dataset.idx);
          const un = sel.value;
          state.billItems[idx].username = un;
          if (un) {
            state.recentUsernames = [un, ...state.recentUsernames.filter(u => u !== un)].slice(0, 10);
          }
        };
      });

      $$('.bill-value-input').forEach(inp => {
        inp.oninput = () => {
          const idx = parseInt(inp.dataset.idx);
          state.billItems[idx].value = inp.value;
          // Update result display without full re-render
          const item = state.billItems[idx];
          const calc = calcLine(item);
          const card = inp.closest('.bill-item');
          let result = card.querySelector('.bill-result');
          if (inp.value) {
            if (!result) { render(); return; }
            result.innerHTML = `<span class="pts"><strong>Pts:</strong> ${calc.points.toFixed(2)}</span>
              <span class="amt"><strong>$:</strong> ${calc.dollars.toFixed(2)}</span>
              <span class="rate">Rate: ${item.rate}%</span>`;
          }
          // Update totals
          updateTotals();
        };
      });

      $$('[data-pay]').forEach(btn => {
        btn.onclick = () => { state.paymentStatus = btn.dataset.pay; render(); };
      });

      if ($('#partialAmountInput')) {
        $('#partialAmountInput').oninput = (e) => { state.partialAmount = e.target.value; };
      }

      if ($('#copyBill')) {
        $('#copyBill').onclick = () => {
          const text = generateBillText(c);
          navigator.clipboard.writeText(text).then(() => alert('Bill copied to clipboard!'));
        };
      }

      if ($('#saveBill')) {
        $('#saveBill').onclick = async () => {
          const bill = buildBillObject(c);
          // Deduct from master games
          for (const item of state.billItems) {
            if (item.gameId) {
              const calc = calcLine(item);
              const mg = state.masterGames.find(g => g.name === item.gameName);
              if (mg) {
                const newPts = (mg.remainingPoints || 0) - calc.points;
                await db.doc(`${userPath()}/masterGames/${mg._id}`).update({ remainingPoints: newPts });
              }
            }
          }
          await db.collection(`${userPath()}/bills`).add(bill);
          await loadAllData();
          $('#billSavedMsg').classList.remove('hidden');
          setTimeout(() => { try { $('#billSavedMsg')?.classList.add('hidden'); } catch(e){} }, 3000);
        };
      }
    }

    function updateTotals() {
      let totalPts = 0, totalDollars = 0;
      state.billItems.forEach(item => {
        const calc = calcLine(item);
        totalPts += calc.points;
        totalDollars += calc.dollars;
      });
      // Quick DOM update if elements exist
      // Just re-render for simplicity with totals
    }

    function generateBillText(c) {
      let totalPts = 0, totalDollars = 0;
      state.billItems.forEach(i => { const calc = calcLine(i); totalPts += calc.points; totalDollars += calc.dollars; });
      const lines = [`BILL - ${c.name}`, `Date: ${new Date().toLocaleString()}`, `Mode: ${state.convMode==='pts2dollar'?'Points → $':'$ → Points'}`, '','Items:','-'.repeat(50)];
      state.billItems.forEach((item, i) => {
        const calc = calcLine(item);
        lines.push(`${i+1}. ${item.gameName||'N/A'} | User: ${item.username||'N/A'}`);
        lines.push(`   Points: ${calc.points.toFixed(2)} | Amount: $${calc.dollars.toFixed(2)}`);
      });
      lines.push('-'.repeat(50));
      lines.push(`TOTAL: ${totalPts.toFixed(2)} pts | $${totalDollars.toFixed(2)}`);
      lines.push('');
      const received = state.paymentStatus==='partial'?parseFloat(state.partialAmount)||0 : state.paymentStatus==='received'?totalDollars:0;
      lines.push(`Payment: ${state.paymentStatus==='received'?'RECEIVED IN FULL':state.paymentStatus==='partial'?'PARTIAL - $'+received+' received':'NOT RECEIVED'}`);
      if (state.paymentStatus !== 'received') lines.push(`Balance Due: $${(totalDollars-received).toFixed(2)}`);
      return lines.join('\n');
    }

    function buildBillObject(c) {
      let totalPts = 0, totalDollars = 0;
      const items = state.billItems.map(item => {
        const calc = calcLine(item);
        totalPts += calc.points; totalDollars += calc.dollars;
        return { gameName:item.gameName, gameId:item.gameId, username:item.username, value:parseFloat(item.value)||0, ...calc };
      });
      const received = state.paymentStatus==='partial'?parseFloat(state.partialAmount)||0:state.paymentStatus==='received'?totalDollars:0;
      return {
        companyId:c._id, companyName:c.name, date:new Date().toISOString(), convMode:state.convMode,
        items, totalDollars, totalPoints:totalPts, paymentStatus:state.paymentStatus,
        partialAmount:received, balanceDue:totalDollars-received
      };
    }

    // ============================================================
    // GAMES & RATES
    // ============================================================
    function renderGamesRates(c) {
      return `
        <div class="subtabs">
          <button class="subtab ${state.gamesSubTab==='rates'?'active':''}" data-sub="rates">💲 Assign Rates</button>
          <button class="subtab ${state.gamesSubTab==='usernames'?'active':''}" data-sub="usernames">👤 Usernames</button>
        </div>
        <div id="gamesSubContent">
          ${state.gamesSubTab === 'rates' ? renderRates(c) : renderUsernames(c)}
        </div>
      `;
    }

    function renderRates(c) {
      const assigned = c.assignedGames || [];
      const available = state.masterGames.filter(mg => !assigned.find(ag => ag.gameName === mg.name));
      return `
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <div class="search-wrap" style="flex:1">
            <span class="search-icon">🔍</span>
            <input class="input input-search" id="rateSearch" placeholder="Search assigned games..." />
          </div>
          <button class="btn btn-purple" id="showAssignGame">➕ Assign Game</button>
        </div>
        <div id="assignGameForm" class="hidden" style="margin-bottom:14px">
          <div class="card" style="padding:14px;border-color:rgba(124,58,237,0.25)">
            <h4 style="font-family:'Orbitron',monospace;font-size:12px;color:var(--purpleLight);margin-bottom:10px">ASSIGN GAMES WITH RATE</h4>
            <span class="label" style="margin-bottom:6px">Select Games (click to toggle)</span>
            <div id="availableGames" style="display:flex;flex-wrap:wrap;gap:5px;max-height:130px;overflow-y:auto;padding:4px;margin-bottom:12px">
              ${available.map(mg => `<div class="game-tag" data-name="${esc(mg.name)}">${esc(mg.name)}</div>`).join('')}
              ${available.length===0?'<span style="color:var(--textMuted);font-size:13px">All games already assigned</span>':''}
            </div>
            <div style="display:flex;gap:8px;align-items:flex-end">
              <div style="flex:1">
                <span class="label">Rate (%)</span>
                <input class="input" type="number" id="assignRate" placeholder="e.g. 10" />
              </div>
              <button class="btn btn-green" id="confirmAssign">Assign</button>
            </div>
          </div>
        </div>
        <div id="assignedList">
          ${assigned.map(g => `<div class="assigned-row" data-id="${g._id}">
            <span style="font-size:16px;color:var(--cyan);margin-right:10px">🎮</span>
            <span style="flex:1;font-weight:600;font-size:14px">${esc(g.gameName)}</span>
            <span class="badge badge-cyan">${g.rate||0}%</span>
            <button class="btn btn-ghost btn-sm rate-edit" data-id="${g._id}" style="margin-left:6px">✏️</button>
            <button class="btn btn-ghost btn-sm rate-del" data-id="${g._id}" style="color:var(--red)">🗑️</button>
          </div>`).join('')}
          ${assigned.length===0?'<div style="padding:30px;text-align:center;color:var(--textMuted)">No games assigned yet</div>':''}
        </div>
      `;
    }

    function renderUsernames(c) {
      const assigned = c.assignedGames || [];
      const allUsernames = c.usernames || [];
      const gameOptions = assigned.map(g => `<option value="${esc(g.gameName)}">${esc(g.gameName)}</option>`).join('');
      return `
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <div style="flex:1">
            <select class="input" id="unGameFilter"><option value="">All Games</option>${gameOptions}</select>
          </div>
          <div class="search-wrap" style="flex:1">
            <span class="search-icon">🔍</span>
            <input class="input input-search" id="unSearch" placeholder="Search usernames..." />
          </div>
        </div>
        <div class="card" style="padding:12px;margin-bottom:14px;background:var(--bgInput)">
          <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
            <div style="flex:2;min-width:120px">
              <span class="label">Game</span>
              <select class="input" id="unAddGame"><option value="">Select game</option>${gameOptions}</select>
            </div>
            <div style="flex:2;min-width:120px">
              <span class="label">Username</span>
              <input class="input" id="unAddName" placeholder="Username" />
            </div>
            <div style="flex:1.5;min-width:100px">
              <span class="label">Level</span>
              <select class="input" id="unAddLevel">
                <option value="">Select level</option>
                <option value="Master">Master</option>
                <option value="Distributor">Distributor</option>
                <option value="Sub-Distributor">Sub-Distributor</option>
                <option value="Store">Store</option>
                <option value="Player">Player</option>
              </select>
            </div>
            <button class="btn btn-green" id="unAddBtn">➕ Add</button>
          </div>
        </div>
        <div id="usernamesList">
          ${allUsernames.map(u => {
            const levelColors = {Master:'badge-red',Distributor:'badge-orange','Sub-Distributor':'badge-cyan',Store:'badge-purple',Player:'badge-green'};
            const lvBadge = u.level ? `<span class="badge ${levelColors[u.level]||'badge-orange'}" style="margin-left:4px">${esc(u.level)}</span>` : '';
            return `<div class="username-row" data-id="${u._id}" data-game="${esc(u.gameName)}">
            <span style="font-size:14px;color:var(--pink);margin-right:8px">👤</span>
            <span style="flex:1;font-weight:600;font-size:13px">${esc(u.username)}</span>
            <span class="badge badge-purple">${esc(u.gameName)}</span>
            ${lvBadge}
            <button class="btn btn-ghost btn-sm un-del" data-id="${u._id}" style="margin-left:6px;color:var(--red)">🗑️</button>
          </div>`;}).join('')}
          ${allUsernames.length===0?'<div style="padding:30px;text-align:center;color:var(--textMuted)">No usernames added yet</div>':''}
        </div>
      `;
    }

    function bindGamesRates() {
      const c = state.companies[state.selectedCompanyId];
      if (!c) return;
      const cid = c._id;

      $$('.subtab').forEach(t => {
        t.onclick = () => { state.gamesSubTab = t.dataset.sub; render(); };
      });

      if (state.gamesSubTab === 'rates') {
        let selectedGames = [];
        $('#showAssignGame').onclick = () => $('#assignGameForm').classList.toggle('hidden');
        $$('.game-tag').forEach(tag => {
          tag.onclick = () => {
            const name = tag.dataset.name;
            if (selectedGames.includes(name)) {
              selectedGames = selectedGames.filter(n => n !== name);
              tag.classList.remove('selected');
              tag.textContent = name;
            } else {
              selectedGames.push(name);
              tag.classList.add('selected');
              tag.textContent = '✓ ' + name;
            }
          };
        });
        $('#confirmAssign').onclick = async () => {
          const rate = parseFloat($('#assignRate').value) || 0;
          for (const name of selectedGames) {
            await db.collection(`${userPath()}/companies/${cid}/assignedGames`).add({ gameName: name, rate });
          }
          await loadAllData(); render();
        };
        $('#rateSearch').oninput = () => {
          const q = $('#rateSearch').value.toLowerCase();
          $$('.assigned-row').forEach(r => {
            const name = r.querySelector('span:nth-child(2)').textContent.toLowerCase();
            r.style.display = name.includes(q) ? '' : 'none';
          });
        };
        $$('.rate-edit').forEach(btn => {
          btn.onclick = () => {
            const id = btn.dataset.id;
            const g = (c.assignedGames||[]).find(x => x._id === id);
            if (!g) return;
            const row = btn.closest('.assigned-row');
            const badge = row.querySelector('.badge');
            badge.outerHTML = `<input class="input" type="number" value="${g.rate||0}" id="editRate_${id}" style="width:80px"/>`;
            btn.outerHTML = `<button class="btn btn-green btn-sm" id="saveRate_${id}">✓</button>`;
            $(`#saveRate_${id}`).onclick = async () => {
              const newRate = parseFloat($(`#editRate_${id}`).value) || 0;
              await db.doc(`${userPath()}/companies/${cid}/assignedGames/${id}`).update({ rate: newRate });
              await loadAllData(); render();
            };
          };
        });
        $$('.rate-del').forEach(btn => {
          btn.onclick = async () => {
            if (!confirm('Remove this game?')) return;
            await db.doc(`${userPath()}/companies/${cid}/assignedGames/${btn.dataset.id}`).delete();
            await loadAllData(); render();
          };
        });
      }

      if (state.gamesSubTab === 'usernames') {
        const filterAndSearch = () => {
          const gameFilter = $('#unGameFilter').value;
          const search = ($('#unSearch').value || '').toLowerCase();
          $$('.username-row').forEach(r => {
            const game = r.dataset.game;
            const name = r.querySelector('span:nth-child(2)').textContent.toLowerCase();
            const matchGame = !gameFilter || game === gameFilter;
            const matchSearch = !search || name.includes(search);
            r.style.display = (matchGame && matchSearch) ? '' : 'none';
          });
        };
        if ($('#unGameFilter')) $('#unGameFilter').onchange = filterAndSearch;
        if ($('#unSearch')) $('#unSearch').oninput = filterAndSearch;

        $('#unAddBtn').onclick = async () => {
          const game = $('#unAddGame').value;
          const name = $('#unAddName').value.trim();
          const level = $('#unAddLevel').value.trim();
          if (!game || !name) return;
          await db.collection(`${userPath()}/companies/${cid}/usernames`).add({ gameName: game, username: name, level });
          await loadAllData(); render();
        };

        $$('.un-del').forEach(btn => {
          btn.onclick = async () => {
            if (!confirm('Remove this username?')) return;
            await db.doc(`${userPath()}/companies/${cid}/usernames/${btn.dataset.id}`).delete();
            await loadAllData(); render();
          };
        });
      }
    }

    // ============================================================
    // COMPANY SETTINGS
    // ============================================================
    function renderCompanySettings(c) {
      const isActive = c.active !== false;
      const compBills = state.bills.filter(b => b.companyId === c._id).sort((a,b) => new Date(b.date)-new Date(a.date));
      return `
        <div class="card" style="margin-bottom:14px">
          <h4 style="font-family:'Orbitron',monospace;font-size:13px;margin-bottom:12px">COMPANY NAME</h4>
          <div id="companyNameDisplay" style="display:flex;align-items:center;gap:10px">
            <span style="font-size:16px;font-weight:700;flex:1">${esc(c.name)}</span>
            <button class="btn btn-ghost btn-sm" id="editCompanyNameBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
              Edit
            </button>
          </div>
          <div id="companyNameEdit" class="hidden" style="display:flex;align-items:center;gap:8px;margin-top:8px">
            <input class="input" id="editCompanyNameInput" value="${esc(c.name)}" style="flex:1" />
            <button class="btn btn-green btn-sm" id="saveCompanyName">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
            </button>
            <button class="btn btn-ghost btn-sm" id="cancelCompanyName">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
        <div class="card" style="margin-bottom:14px">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <h4 style="font-family:'Orbitron',monospace;font-size:13px;margin-bottom:4px">COMPANY STATUS</h4>
              <p style="font-size:12px;color:var(--textMuted)">Toggle active / inactive</p>
            </div>
            <div class="toggle" id="activeToggle">
              <div class="toggle-track ${isActive?'on':'off'}"><div class="toggle-thumb"></div></div>
              <span class="toggle-label" style="color:${isActive?'var(--green)':'var(--textSecondary)'}">${isActive?'Active':'Inactive'}</span>
            </div>
          </div>
        </div>
        <div class="card" style="margin-bottom:14px">
          <h4 style="font-family:'Orbitron',monospace;font-size:13px;margin-bottom:10px">GENERATE REPORT</h4>
          <p style="font-size:12px;color:var(--textMuted);margin-bottom:14px">Download detailed Excel (CSV) report with loads, redemptions, payments, and balance.</p>
          <button class="btn btn-green" id="downloadReport">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Download Report
          </button>
        </div>
        <div class="card" style="margin-bottom:14px">
          <h4 style="font-family:'Orbitron',monospace;font-size:13px;margin-bottom:10px">BILL HISTORY</h4>
          ${compBills.length===0?'<div style="padding:20px;text-align:center;color:var(--textMuted)">No bills recorded yet</div>':''}
          <div style="max-height:350px;overflow-y:auto">
            ${compBills.map(b => `<div class="bill-history-item">
              <div style="flex:1">
                <div style="font-size:12px;color:var(--textMuted)">${new Date(b.date).toLocaleDateString()} ${new Date(b.date).toLocaleTimeString()}</div>
                <div style="font-size:11px;color:var(--textMuted)">${(b.items||[]).length} items</div>
              </div>
              <div style="text-align:right">
                <div style="font-weight:700;color:var(--green);font-family:'Orbitron',monospace;font-size:13px">$${(b.totalDollars||0).toFixed(2)}</div>
                <div style="font-size:11px;color:var(--cyan)">${(b.totalPoints||0).toFixed(2)} pts</div>
              </div>
              <span class="badge ${b.paymentStatus==='received'?'badge-green':b.paymentStatus==='partial'?'badge-orange':'badge-red'}">
                ${b.paymentStatus==='received'?'Paid':b.paymentStatus==='partial'?'Partial':'Unpaid'}
              </span>
            </div>`).join('')}
          </div>
        </div>
        <div class="card" style="border-color:rgba(239,68,68,0.25)">
          <h4 style="font-family:'Orbitron',monospace;font-size:13px;margin-bottom:4px;color:var(--red)">DANGER ZONE</h4>
          <p style="font-size:12px;color:var(--textMuted);margin-bottom:14px">Permanently delete this company and all its assigned games, usernames, and bills.</p>
          <button class="btn btn-red" id="deleteCompanyBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            Delete Company
          </button>
        </div>
      `;
    }

    function bindCompanySettings() {
      const c = state.companies[state.selectedCompanyId];
      if (!c) return;

      // Edit company name
      $('#editCompanyNameBtn').onclick = () => {
        $('#companyNameDisplay').classList.add('hidden');
        const editDiv = $('#companyNameEdit');
        editDiv.classList.remove('hidden');
        editDiv.style.display = 'flex';
        $('#editCompanyNameInput').focus();
      };
      $('#cancelCompanyName').onclick = () => {
        $('#companyNameDisplay').classList.remove('hidden');
        $('#companyNameEdit').classList.add('hidden');
      };
      $('#saveCompanyName').onclick = async () => {
        const newName = $('#editCompanyNameInput').value.trim();
        if (!newName) return;
        await db.doc(`${userPath()}/companies/${c._id}`).update({ name: newName });
        await loadAllData(); render();
      };
      $('#editCompanyNameInput').onkeydown = (e) => {
        if (e.key === 'Enter') $('#saveCompanyName').click();
        if (e.key === 'Escape') $('#cancelCompanyName').click();
      };

      // Toggle active
      $('#activeToggle').onclick = async () => {
        const newVal = c.active === false ? true : false;
        await db.doc(`${userPath()}/companies/${c._id}`).update({ active: newVal });
        await loadAllData(); render();
      };

      // Download report
      $('#downloadReport').onclick = () => {
        const compBills = state.bills.filter(b => b.companyId === c._id);
        let csv = 'Date,Game,Username,Points,Amount($),Payment Status,Amount Received,Balance Due\n';
        compBills.forEach(bill => {
          (bill.items || []).forEach(item => {
            csv += `"${new Date(bill.date).toLocaleString()}","${item.gameName||''}","${item.username||''}",${(item.points||0).toFixed(2)},${(item.dollars||0).toFixed(2)},"${bill.paymentStatus}",${bill.partialAmount||0},${bill.balanceDue||0}\n`;
          });
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${c.name}_report_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
      };

      // Delete company
      $('#deleteCompanyBtn').onclick = async () => {
        const confirmName = prompt(`Type "${c.name}" to confirm deletion:`);
        if (confirmName !== c.name) { if (confirmName !== null) alert('Name did not match. Deletion cancelled.'); return; }
        try {
          // Delete subcollections first
          const agSnap = await db.collection(`${userPath()}/companies/${c._id}/assignedGames`).get();
          for (const doc of agSnap.docs) await doc.ref.delete();
          const unSnap = await db.collection(`${userPath()}/companies/${c._id}/usernames`).get();
          for (const doc of unSnap.docs) await doc.ref.delete();
          // Delete company doc
          await db.doc(`${userPath()}/companies/${c._id}`).delete();
          await loadAllData();
          state.view = 'companies';
          state.selectedCompanyId = null;
          render();
        } catch (e) {
          alert('Delete failed: ' + e.message);
        }
      };
    }

    // ============================================================
    // AUTH STATE LISTENER
    // ============================================================
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        state.user = {
          uid: user.uid,
          email: user.email,
          displayName: user.displayName,
          photoURL: user.photoURL,
        };
        state.view = 'loading';
        render();
        await loadAllData();
        state.view = 'companies';
        render();
      } else {
        state.user = null;
        state.view = 'login';
        state.companies = {};
        state.masterGames = [];
        state.bills = [];
        render();
      }
    });

    // Initial render
    render();
  </script>
</body>
</html>
